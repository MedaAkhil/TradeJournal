<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trade Details - Trade Journal Pro</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        /* ============== 60-30-10 COLOR SCHEME (Matching all pages) ============== */
        :root {
            /* 60% - Primary Background */
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            
            /* 30% - Secondary Surface */
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            
            /* 10% - Accent Colors */
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            
            /* Text Colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            
            body {
                background: var(--bg-gradient);
            }
            
            .trade-detail-card,
            .screenshots-gallery,
            .bg-light {
                background: var(--surface-white);
                border-color: var(--border-light);
            }
            
            .metric-card,
            .notes-section {
                background: var(--surface-hover);
                border-color: var(--border-light);
            }
            
            .table {
                color: var(--text-primary);
            }
            
            .table td {
                border-color: var(--border-light);
            }
            
            .modal-content {
                background: var(--surface-white);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Modern Navigation - Matching all pages */
        .navbar {
            background: #2c3e50 !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-md);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-brand i {
            -webkit-text-fill-color: white;
            color: white;
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Back Navigation */
        .back-navigation {
            margin: 1.5rem 0;
        }

        .back-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }

        .back-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Trade Detail Card */
        .trade-detail-card {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .trade-detail-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success), var(--accent-danger));
        }

        /* Trade Header */
        .trade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-light);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .trade-title h1 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .trade-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .trade-pnl-large {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: right;
        }

        .trade-pnl-large.profit {
            color: var(--accent-success);
        }

        .trade-pnl-large.loss {
            color: var(--accent-danger);
        }

        .trade-pnl-large small {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: normal;
        }

        /* Trade Metrics Grid */
        .trade-metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--surface-hover);
            padding: 1.25rem;
            border-radius: var(--radius-md);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border-light);
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .metric-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Table Styling */
        .table {
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .table-sm td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table-sm td:first-child {
            font-weight: 600;
            color: var(--text-secondary);
            width: 35%;
        }

        .table-sm td:last-child {
            color: var(--text-primary);
            font-weight: 500;
        }

        .text-success {
            color: var(--accent-success) !important;
        }

        .text-danger {
            color: var(--accent-danger) !important;
        }

        /* Notes Section */
        .notes-section {
            background: var(--surface-hover);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1rem;
            height: 100%;
        }

        .notes-section h6 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notes-section p {
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.6;
        }

        /* Screenshots Gallery */
        .screenshots-gallery {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .screenshots-gallery::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success));
        }

        .screenshots-gallery h2 {
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .screenshots-gallery h2 i {
            color: var(--accent-primary);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            color: white;
            font-size: 2rem;
        }

        /* Annotated badge */
        .annotated-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            color: white;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        .annotated-badge i {
            font-size: 0.7rem;
        }

        /* Image tags */
        .image-tags {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            z-index: 2;
        }

        .image-tag {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .edit-btn, .delete-btn-large {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .edit-btn {
            background: var(--accent-primary);
            color: white;
        }

        .edit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .delete-btn-large {
            background: var(--accent-danger);
            color: white;
        }

        .delete-btn-large:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--accent-primary);
            font-size: 1rem;
        }

        .loading-spinner i {
            font-size: 2rem;
            margin-right: 0.5rem;
        }

        /* Alert */
        .alert {
            border-radius: var(--radius-md);
            border: none;
            padding: 1rem;
        }

        .alert-danger {
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent-danger);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            cursor: pointer;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1001;
        }

        .close-modal:hover {
            color: var(--accent-danger);
        }

        .modal-caption {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            text-align: center;
            color: #ccc;
            padding: 10px 0;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-hover);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ============== RESPONSIVE DESIGN ============== */
        
        /* Mobile devices (up to 768px) */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0 0.75rem;
            }

            .back-navigation {
                margin: 1rem 0;
            }

            .trade-detail-card {
                padding: 1.25rem;
            }

            .trade-header {
                flex-direction: column;
                text-align: center;
            }

            .trade-title h1 {
                font-size: 1.5rem;
            }

            .trade-pnl-large {
                font-size: 2rem;
                text-align: center;
            }

            .trade-metrics-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .metric-value {
                font-size: 1.25rem;
            }

            .row {
                flex-direction: column;
                gap: 1rem;
            }

            .col-md-6 {
                width: 100%;
                margin-bottom: 1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .edit-btn, .delete-btn-large {
                width: 100%;
                justify-content: center;
            }

            .table-sm td {
                padding: 0.5rem;
                font-size: 0.85rem;
            }
        }

        /* Small phones (up to 480px) */
        @media screen and (max-width: 480px) {
            .trade-title h1 {
                font-size: 1.25rem;
            }

            .trade-pnl-large {
                font-size: 1.5rem;
            }

            .metric-value {
                font-size: 1.1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .annotated-badge {
                font-size: 0.6rem;
                padding: 2px 6px;
            }

            .image-tag {
                font-size: 0.55rem;
                padding: 1px 4px;
            }
        }

        /* Tablets (769px - 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1rem;
            }

            .trade-metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Accessibility - Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Focus States */
        button:focus-visible,
        .gallery-item:focus-visible {
            outline: 3px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Touch Target Sizes */
        @media (hover: none) and (pointer: coarse) {
            button,
            .back-btn,
            .edit-btn,
            .delete-btn-large,
            .gallery-item {
                min-height: 44px;
            }
            
            .gallery-item {
                min-height: 120px;
            }
        }

        /* Print Styles */
        @media print {
            .navbar,
            .back-navigation,
            .action-buttons,
            .modal {
                display: none !important;
            }
            
            .trade-detail-card,
            .screenshots-gallery {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            
            body {
                background: white;
            }
        }

        /* Utility Classes */
        .bg-light {
            background: var(--surface-hover) !important;
        }

        .rounded {
            border-radius: var(--radius-md) !important;
        }
        /* Make tables transparent to match page background */
.table {
    background: transparent !important;
}

.table-sm td {
    background: transparent !important;
    border-bottom: 1px solid var(--border-light);
}

/* If you want a subtle background for the table rows on hover only */
.table-sm tr:hover td {
    background: var(--surface-hover) !important;
}

/* Remove any background from the notes section if needed */
.notes-section {
    background: transparent !important;
    border: 1px solid var(--border-light);
}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-chart-line me-2"></i>Trade Journal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-book me-1"></i>Journal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="calendar.html">
                            <i class="fas fa-calendar me-1"></i>Calendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-chart-pie me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="export.html">
                            <i class="fas fa-download me-1"></i>Backup
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Back button -->
        <div class="back-navigation">
            <button onclick="goBack()" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Journal
            </button>
        </div>

        <!-- Trade Detail Card -->
        <div class="trade-detail-card" id="tradeDetailCard">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-spinner fa-spin"></i> Loading trade details...
            </div>
            
            <!-- Trade details will be populated here by JavaScript -->
        </div>

        <!-- Screenshots Gallery -->
        <div class="screenshots-gallery" id="screenshotsGallery" style="display: none;">
            <h2><i class="fas fa-images"></i> Screenshots</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button onclick="editTrade()" class="edit-btn">
                <i class="fas fa-edit"></i> Edit Trade
            </button>
            <button onclick="deleteTradeFromDetail()" class="delete-btn-large">
                <i class="fas fa-trash"></i> Delete Trade
            </button>
        </div>
    </div>

    <!-- Fullscreen Image Modal -->
    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="fullscreenImage">
        <div class="modal-caption" id="imageCaption"></div>
    </div>

    <!-- Keep all original script references -->
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- All original JavaScript preserved exactly -->
    <script>
        // In trade-detail.html, add this function

        document.addEventListener('DOMContentLoaded', () => {
            loadTradeDetail();
        });
        
        function displayScreenshots(screenshots) {
            const gallery = document.getElementById('screenshotsGallery');
            const grid = document.getElementById('galleryGrid');
            
            if (!gallery || !grid) return;
            
            if (!screenshots || screenshots.length === 0) {
                gallery.style.display = 'none';
                return;
            }
            
            gallery.style.display = 'block';
            
            let html = '';
            screenshots.forEach((screenshot, index) => {
                // Handle both old format (string URL) and new format (object with url)
                const imageUrl = typeof screenshot === 'string' ? screenshot : screenshot.url;
                const isAnnotated = typeof screenshot === 'object' && screenshot.annotated === true;
                const tags = typeof screenshot === 'object' && screenshot.tags ? screenshot.tags : [];
                
                html += `
                    <div class="gallery-item" onclick="openFullscreenImage('${imageUrl}', ${index + 1})">
                        <img src="${imageUrl}" alt="Screenshot ${index + 1}">
                        ${isAnnotated ? '<div class="annotated-badge"><i class="fas fa-paint-brush"></i> Annotated</div>' : ''}
                        <div class="gallery-overlay">
                            <i class="fas fa-search-plus"></i>
                        </div>
                        ${tags.length > 0 ? `
                            <div class="image-tags">
                                ${tags.map(tag => `<span class="image-tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // Update the loadTradeDetail function to use the new display function
        async function loadTradeDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const date = urlParams.get('date');
            const tradeIndex = parseInt(urlParams.get('index'));

            if (!date || isNaN(tradeIndex)) {
                showError('Invalid trade reference');
                return;
            }

            try {
                // Use the method from your app.js
                const dayData = await TradeJournal.loadDay(date);
                
                if (!dayData.trades || !dayData.trades[tradeIndex]) {
                    showError('Trade not found');
                    return;
                }

                const trade = dayData.trades[tradeIndex];
                
                // Hide spinner
                document.getElementById('loadingSpinner').style.display = 'none';

                // --- 3. CALL DISPLAY FUNCTIONS ---
                displayTradeDetails(date, trade);
                
                if (trade.screenshots && trade.screenshots.length > 0) {
                    displayScreenshots(trade.screenshots);
                }

                // Show buttons
                document.getElementById('actionButtons').style.display = 'flex';

            } catch (error) {
                console.error("Load Error:", error);
                showError('Failed to connect to database');
            }
        }
        
        function displayTradeDetails(date, trade) {
            const container = document.getElementById('tradeDetailCard');
            const taxes = Calc.tradeTaxes(trade); // Uses the math from your app.js
            
            container.innerHTML = `
                <div class="trade-header">
                    <div class="trade-title">
                        <h1>${trade.symbol}</h1>
                        <span class="trade-date">
                            <i class="fas fa-calendar-alt"></i> ${Calc.formatDate(date)} 
                            <i class="fas fa-tag ms-2"></i> ${trade.strategy || 'No Strategy'}
                        </span>
                    </div>
                    <div class="trade-pnl-large ${taxes.netPnL >= 0 ? 'profit' : 'loss'}">
                        ₹${Calc.format(taxes.netPnL)}
                        <small>Net P&L</small>
                    </div>
                </div>

                <div class="trade-metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Entry Price</span>
                        <span class="metric-value">₹${Calc.format(trade.entryPrice)}</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Exit Price</span>
                        <span class="metric-value">₹${Calc.format(trade.exitPrice)}</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Quantity</span>
                        <span class="metric-value">${trade.quantity}</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Direction</span>
                        <span class="metric-value ${trade.direction.toLowerCase()}">${trade.direction === 'LONG' ? '📈 LONG' : '📉 SHORT'}</span>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-sm">
                            <tr>
                                <td><i class="fas fa-clock"></i> Entry Time</td>
                                <td>${trade.entryTime || '--:--'}</td>
                            </tr>
                            <tr>
                                <td><i class="fas fa-clock"></i> Exit Time</td>
                                <td>${trade.exitTime || '--:--'}</td>
                            </tr>
                            <tr>
                                <td><i class="fas fa-bullseye"></i> Target (TP)</td>
                                <td class="text-success">${trade.takeProfit ? '₹' + Calc.format(trade.takeProfit) : '--'}</td>
                            </tr>
                            <tr>
                                <td><i class="fas fa-shield-alt"></i> Stop Loss</td>
                                <td class="text-danger">${trade.stopLoss ? '₹' + Calc.format(trade.stopLoss) : '--'}</td>
                            </tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <div class="notes-section">
                            <h6><i class="fas fa-sticky-note"></i> Trade Notes</h6>
                            <p>${trade.notes || 'No notes provided for this trade.'}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- 5. UI HELPERS ---
        function goBack() { 
            window.location.href = 'index.html'; 
        }

        function showError(msg) {
            document.getElementById('tradeDetailCard').innerHTML = `
                <div class="alert alert-danger m-3 text-center">
                    <i class="fas fa-exclamation-triangle me-2"></i> ${msg}
                    <br><button class="btn btn-sm btn-outline-danger mt-2" onclick="goBack()">Go Back</button>
                </div>`;
        }

        // Modal Logic for Screenshots
        function openFullscreenImage(url, index) {
            const modal = document.getElementById('imageModal');
            const fullscreenImg = document.getElementById('fullscreenImage');
            const caption = document.getElementById('imageCaption');
            
            modal.style.display = "block";
            fullscreenImg.src = url;
            caption.textContent = `Screenshot ${index}`;
        }
        
        function closeImageModal() { 
            document.getElementById('imageModal').style.display = "none"; 
        }
        
        // Edit and Delete functions (should be in your app.js)
        function editTrade() {
            const urlParams = new URLSearchParams(window.location.search);
            const date = urlParams.get('date');
            const index = urlParams.get('index');
            window.location.href = `journal.html?edit=true&date=${date}&index=${index}`;
        }
        
        async function deleteTradeFromDetail() {
            if (!confirm('Are you sure you want to delete this trade? This action cannot be undone.')) return;
            
            const urlParams = new URLSearchParams(window.location.search);
            const date = urlParams.get('date');
            const index = parseInt(urlParams.get('index'));
            
            try {
                await TradeJournal.deleteTrade(date, index);
                alert('Trade deleted successfully!');
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Delete error:', error);
                alert('Failed to delete trade. Please try again.');
            }
        }
    </script>
</body>
</html>
