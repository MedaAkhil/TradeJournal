    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Annotated badge */
        .annotated-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }

        .annotated-badge i {
            font-size: 0.8rem;
        }

        /* Image tags */
        .image-tags {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            z-index: 2;
        }

        .image-tag {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            backdrop-filter: blur(2px);
        }

        /* Update gallery item to handle badges */
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            color: white;
            font-size: 2rem;
        }
    </style>
</head>

    <script>
        // In trade-detail.html, add this function

        document.addEventListener('DOMContentLoaded', () => {
    loadTradeDetail();
});
        function displayScreenshots(screenshots) {
            const gallery = document.getElementById('screenshotsGallery');
            const grid = document.getElementById('galleryGrid');
            
            if (!gallery || !grid) return;
            
            if (!screenshots || screenshots.length === 0) {
                gallery.style.display = 'none';
                return;
            }
            
            gallery.style.display = 'block';
            
            let html = '';
            screenshots.forEach((screenshot, index) => {
                // Handle both old format (string URL) and new format (object with url)
                const imageUrl = typeof screenshot === 'string' ? screenshot : screenshot.url;
                const isAnnotated = typeof screenshot === 'object' && screenshot.annotated === true;
                const tags = typeof screenshot === 'object' && screenshot.tags ? screenshot.tags : [];
                
                html += `
                    <div class="gallery-item" onclick="openFullscreenImage('${imageUrl}', ${index + 1})">
                        <img src="${imageUrl}" alt="Screenshot ${index + 1}">
                        ${isAnnotated ? '<div class="annotated-badge"><i class="fas fa-paint-brush"></i> Annotated</div>' : ''}
                        <div class="gallery-overlay">
                            <i class="fas fa-search-plus"></i>
                        </div>
                        ${tags.length > 0 ? `
                            <div class="image-tags">
                                ${tags.map(tag => `<span class="image-tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        // Update the loadTradeDetail function to use the new display function
        async function loadTradeDetail() {
    const urlParams = new URLSearchParams(window.location.search);
    const date = urlParams.get('date');
    const tradeIndex = parseInt(urlParams.get('index'));

    if (!date || isNaN(tradeIndex)) {
        showError('Invalid trade reference');
        return;
    }

    try {
        // Use the method from your app.js
        const dayData = await TradeJournal.loadDay(date);
        
        if (!dayData.trades || !dayData.trades[tradeIndex]) {
            showError('Trade not found');
            return;
        }

        const trade = dayData.trades[tradeIndex];
        
        // Hide spinner
        document.getElementById('loadingSpinner').style.display = 'none';

        // --- 3. CALL DISPLAY FUNCTIONS ---
        displayTradeDetails(date, trade);
        
        if (trade.screenshots && trade.screenshots.length > 0) {
            displayScreenshots(trade.screenshots);
        }

        // Show buttons
        document.getElementById('actionButtons').style.display = 'flex';

    } catch (error) {
        console.error("Load Error:", error);
        showError('Failed to connect to database');
    }
}
function displayTradeDetails(date, trade) {
    const container = document.getElementById('tradeDetailCard');
    const taxes = Calc.tradeTaxes(trade); // Uses the math from your app.js
    
    container.innerHTML = `
        <div class="trade-header">
            <div class="trade-title">
                <h1>${trade.symbol}</h1>
                <span class="trade-date">${Calc.formatDate(date)} | ${trade.strategy || 'No Strategy'}</span>
            </div>
            <div class="trade-pnl-large ${taxes.netPnL >= 0 ? 'profit' : 'loss'}">
                ₹${Calc.format(taxes.netPnL)}
                <small class="d-block text-muted" style="font-size: 0.9rem">Net P&L</small>
            </div>
        </div>

        <div class="trade-metrics-grid mb-4">
            <div class="metric-card">
                <span class="metric-label">Entry</span>
                <span class="metric-value">₹${trade.entryPrice}</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Exit</span>
                <span class="metric-value">₹${trade.exitPrice}</span>
            </div>
            <div class="metric-card">
                <span class="metric-label">Quantity</span>
                <span class="metric-value">${trade.quantity}</span>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <table class="table table-sm">
                    <tr><td>Time</td><td>${trade.entryTime || '--'} - ${trade.exitTime || '--'}</td></tr>
                    <tr><td>Target (TP)</td><td class="text-success">₹${trade.takeProfit || '--'}</td></tr>
                    <tr><td>Stop Loss</td><td class="text-danger">₹${trade.stopLoss || '--'}</td></tr>
                </table>
            </div>
            <div class="col-md-6">
                <div class="notes-section p-3 bg-light rounded">
                    <h6>Notes:</h6>
                    <p class="mb-0">${trade.notes || 'No notes provided.'}</p>
                </div>
            </div>
        </div>
    `;
}

// --- 5. UI HELPERS ---
function goBack() { window.location.href = 'index.html'; }

function showError(msg) {
    document.getElementById('tradeDetailCard').innerHTML = `
        <div class="alert alert-danger m-3 text-center">
            <i class="fas fa-exclamation-triangle"></i> ${msg}
            <br><button class="btn btn-sm btn-outline-danger mt-2" onclick="goBack()">Go Back</button>
        </div>`;
}

// Modal Logic for Screenshots
function openFullscreenImage(url) {
    document.getElementById('imageModal').style.display = "block";
    document.getElementById('fullscreenImage').src = url;
}
function closeImageModal() { document.getElementById('imageModal').style.display = "none"; }
