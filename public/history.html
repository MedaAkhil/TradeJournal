<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>History - Trade Journal Pro</title>
    
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        /* ============== 60-30-10 COLOR SCHEME (Matches other pages) ============== */
        :root {
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            body { background: var(--bg-gradient); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Navbar (exactly as other pages) */
        .navbar {
            background: #2c3e50 !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-md);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar-brand i {
            -webkit-text-fill-color: white;
            color: white;
        }
        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }
        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }
        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
        }
        .navbar-toggler-icon {
            filter: invert(1);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 2rem 0 1.5rem 0;
        }
        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .page-header h1 i {
            color: var(--accent-primary);
        }
        .btn-add {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-add:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Filter Bar */
        .filter-bar {
            background: var(--surface-white);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
            color: var(--text-secondary);
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            background: var(--surface-white);
            color: var(--text-primary);
        }

        /* Timeline List (Global) */
        .timeline-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 3rem;
        }
        .timeline-card {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            border-left: 5px solid var(--accent-primary);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .timeline-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }
        .timeline-header {
            padding: 1rem 1.5rem;
            background: var(--surface-hover);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }
        .timeline-date {
            font-weight: 700;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .timeline-date i {
            font-size: 0.9rem;
        }
        .timeline-time {
            font-family: monospace;
            font-size: 0.9rem;
            background: var(--surface-white);
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-full);
            color: var(--text-secondary);
        }
        .timeline-content {
            padding: 1.25rem 1.5rem;
        }
        .timeline-notes {
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .timeline-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 1px solid var(--border-light);
        }
        .delete-event {
            background: none;
            border: none;
            color: var(--accent-danger);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-md);
        }
        .delete-event:hover {
            background: rgba(231,76,60,0.1);
            transform: scale(1.1);
        }

        /* Modal styles */
        .modal-content {
            background: var(--surface-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
        }
        .modal-header {
            border-bottom-color: var(--border-light);
        }
        .modal-footer {
            border-top-color: var(--border-light);
        }
        .form-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .filter-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-chart-line me-2"></i>Trade Journal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-book me-1"></i>Journal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="calendar.html">
                            <i class="fas fa-calendar me-1"></i>Calendar
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="history.html"><i class="fas fa-history me-1"></i>History</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="notes.html">
                            <i class="fas fa-note-sticky me-1"></i>Notes/Manifesto
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-chart-pie me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="export.html">
                            <i class="fas fa-download me-1"></i>Backup
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-history"></i> Trade & Market History</h1>
            <button class="btn-add" onclick="openAddEventModal()"><i class="fas fa-plus me-2"></i>Add Timeline Entry</button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label><i class="fas fa-calendar-alt me-1"></i>Filter by Date</label>
                <input type="date" id="filterDate" onchange="loadAllEvents()">
            </div>
            <div class="filter-group">
                <label><i class="fas fa-sort-amount-down-alt me-1"></i>Order</label>
                <select id="orderBy" onchange="loadAllEvents()">
                    <option value="desc">Newest First</option>
                    <option value="asc">Oldest First</option>
                </select>
            </div>
            <div class="filter-group">
                <button class="btn btn-outline-primary w-100" onclick="clearFilter()"><i class="fas fa-eraser me-1"></i>Clear Filter</button>
            </div>
        </div>

        <!-- Timeline List Container -->
        <div id="timelineContainer" class="timeline-list">
            <div class="empty-state"><i class="fas fa-spinner fa-spin me-2"></i>Loading events...</div>
        </div>
    </div>

    <!-- Modal: Add/Edit Timeline Event -->
    <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-clock me-2"></i>Add Timeline Entry</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" id="eventDate" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Time (24h)</label>
                        <input type="time" id="eventTime" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes / Description</label>
                        <textarea id="eventNotes" class="form-control" rows="4" placeholder="What happened in the market?"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Screenshot / Image (optional)</label>
                        <input type="file" id="eventImage" class="form-control" accept="image/*">
                        <div id="imagePreview" class="mt-2" style="display: none;">
                            <img id="previewImg" style="max-width: 100%; max-height: 150px; border-radius: 8px;">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEventBtn" onclick="saveEvent()">Save Entry</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ---------- Firebase Config ----------
        const firebaseConfig = {
            apiKey: "AIzaSyCWeNMH5KWGl9qrvMyLf3v4Z5VHAPqWcTE",
            authDomain: "trade-journal-pro-e0ee0.firebaseapp.com",
            projectId: "trade-journal-pro-e0ee0",
            storageBucket: "trade-journal-pro-e0ee0.firebasestorage.app",
            messagingSenderId: "706152926446",
            appId: "1:706152926446:web:2c03f11736e6cdf47377ff"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Collection reference for global timeline events
        const timelineCollection = db.collection('timeline_events');

        // Global variables
        let currentImageFile = null;
        let modalInstance = null;
        
        // DOM elements
        const timelineContainer = document.getElementById('timelineContainer');
        const filterDateInput = document.getElementById('filterDate');
        const orderSelect = document.getElementById('orderBy');

        document.addEventListener('DOMContentLoaded', () => {
            modalInstance = new bootstrap.Modal(document.getElementById('eventModal'));
            loadAllEvents();
        });

        // ------------- Load Events -------------
        async function loadAllEvents() {
            timelineContainer.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin me-2"></i>Loading events...</div>';
            
            try {
                let query = timelineCollection;
                const filterDate = filterDateInput.value;
                if (filterDate) {
                    // Firestore query with date string (YYYY-MM-DD)
                    query = query.where('date', '==', filterDate);
                }
                
                const orderDir = orderSelect.value === 'desc' ? 'desc' : 'asc';
                query = query.orderBy('timestamp', orderDir);
                
                const snapshot = await query.get();
                if (snapshot.empty) {
                    timelineContainer.innerHTML = `<div class="empty-state"><i class="fas fa-database me-2"></i>No entries found. Click "Add Timeline Entry" to start.</div>`;
                    return;
                }
                
                let html = '';
                snapshot.forEach(doc => {
                    const ev = doc.data();
                    const dateDisplay = new Date(ev.date + 'T00:00:00').toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
                    html += `
                        <div class="timeline-card" data-id="${doc.id}">
                            <div class="timeline-header">
                                <div class="timeline-date"><i class="fas fa-calendar-day"></i> ${dateDisplay}</div>
                                <div class="timeline-time"><i class="far fa-clock"></i> ${ev.time}</div>
                                <button class="delete-event" onclick="deleteEvent('${doc.id}')" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </div>
                            <div class="timeline-content">
                                <div class="timeline-notes">${escapeHtml(ev.notes)}</div>
                                ${ev.imageUrl ? `<img src="${ev.imageUrl}" class="timeline-image" onclick="window.open('${ev.imageUrl}', '_blank')">` : ''}
                            </div>
                        </div>
                    `;
                });
                timelineContainer.innerHTML = html;
            } catch (err) {
                console.error("Load error:", err);
                timelineContainer.innerHTML = `<div class="empty-state text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Failed to load data.</div>`;
            }
        }

        // ------------- Add Event -------------
        function openAddEventModal() {
            document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('eventTime').value = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
            document.getElementById('eventNotes').value = '';
            document.getElementById('eventImage').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            currentImageFile = null;
            modalInstance.show();
        }

        document.getElementById('eventImage')?.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                currentImageFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('previewImg').src = ev.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(currentImageFile);
            } else {
                currentImageFile = null;
                document.getElementById('imagePreview').style.display = 'none';
            }
        });

        async function saveEvent() {
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const notes = document.getElementById('eventNotes').value.trim();
            if (!date || !time) {
                alert("Date and Time are required.");
                return;
            }
            
            const saveBtn = document.getElementById('saveEventBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                let imageUrl = null;
                if (currentImageFile) {
                    const storageRef = storage.ref(`global_timeline/${Date.now()}_${currentImageFile.name}`);
                    await storageRef.put(currentImageFile);
                    imageUrl = await storageRef.getDownloadURL();
                }
                
                // Create sortable timestamp (UNIX milliseconds)
                const [hours, minutes] = time.split(':');
                const eventDateTime = new Date(`${date}T${hours}:${minutes}:00`);
                const timestamp = eventDateTime.getTime();
                
                await timelineCollection.add({
                    date: date,
                    time: time,
                    notes: notes,
                    imageUrl: imageUrl,
                    timestamp: timestamp,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                modalInstance.hide();
                loadAllEvents();
                alert("Event saved successfully!");
            } catch (err) {
                console.error("Save error:", err);
                alert("Failed to save event. Check console.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Save Entry';
            }
        }

        // ------------- Delete Event -------------
        async function deleteEvent(docId) {
            if (!confirm("Are you sure? This action cannot be undone.")) return;
            try {
                // Optionally delete image from storage? We'll skip for simplicity, but you can implement.
                await timelineCollection.doc(docId).delete();
                loadAllEvents();
            } catch (err) {
                console.error("Delete error:", err);
                alert("Failed to delete event.");
            }
        }

        // Helper: escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/\n/g, '<br>');
        }

        function clearFilter() {
            filterDateInput.value = '';
            loadAllEvents();
        }
    </script>
</body>
</html>
