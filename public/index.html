<!DOCTYPE html>
<html>
<head>
    <title>Trade Journal</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold" href="/">📊 Trade Journal</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Journal</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="calendar.html">Calendar</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="export.html">Backup</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

    <div class="container">
        <div class="date-navigation">
            <button onclick="previousDay()"><i class="fas fa-chevron-left"></i> Previous</button>
            <div class="date-display">
                <i class="fas fa-calendar-day"></i>
                <input type="date" id="datePicker" onchange="loadDate(this.value)">
            </div>
            <button onclick="nextDay()">Next <i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Daily Summary Card -->
        <div class="daily-summary-card" id="dailySummary">
            <div class="summary-item">
                <span class="summary-label">Total Trades</span>
                <span class="summary-value" id="totalTradesBadge">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Day P&L</span>
                <span class="summary-value" id="dayPnL">$0.00</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Screenshots</span>
                <span class="summary-value" id="totalScreenshotsBadge">0</span>
            </div>
        </div>

        <div id="journalContent">
            <!-- Journal entries will load here -->
        </div>
    </div>

    <!-- Floating Plus Button -->
    <div class="floating-plus" onclick="goToAddTrade()" title="Add New Trade">
        <i class="fas fa-plus"></i>
    </div>

    <!-- Quick Stats Modal (optional) -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Day Statistics</h3>
                <span class="close" onclick="closeStatsModal()">&times;</span>
            </div>
            <div class="modal-body" id="statsModalBody">
                <!-- Stats will be populated here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
