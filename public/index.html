<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trade Journal Pro</title>
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============== ROOT VARIABLES - 60-30-10 COLOR SCHEME ============== */
        :root {
            /* 60% - Primary Background */
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            
            /* 30% - Secondary Surface */
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            
            /* 10% - Accent Colors */
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            
            /* Text Colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            
            /* Spacing */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 3rem;
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }

        /* ============== DARK MODE SUPPORT ============== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            
            .date-navigation input[type="date"] {
                color-scheme: dark;
                background: #1e293b;
                color: #f1f5f9;
                border-color: #334155;
            }
        }

        /* ============== RESET & BASE STYLES ============== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============== MODERN NAVIGATION ============== */
        .navbar {
            background: rgba(44, 62, 80, 0.95) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.25rem;
        }

        .navbar-brand i {
            -webkit-text-fill-color: white;
            color: white;
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
            color: white !important;
        }

        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem;
        }

        .navbar-toggler:focus {
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.5);
            outline: none;
        }

        /* ============== MAIN CONTAINER ============== */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        main.container {
            margin-top: 80px;
            margin-bottom: 40px;
        }

        /* ============== DATE NAVIGATION CARD ============== */
        .date-navigation {
            background: var(--surface-white);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-lg);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid var(--border-light);
        }

        .date-navigation button {
            padding: 0.6rem 1.2rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .date-navigation button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .date-navigation button:active {
            transform: translateY(0);
        }

        .date-navigation input[type="date"] {
            padding: 0.6rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            color: var(--text-primary);
            background: var(--surface-white);
            font-family: 'Inter', sans-serif;
            min-width: 180px;
        }

        .date-navigation input[type="date"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        /* ============== DAILY SUMMARY CARD ============== */
        .daily-summary-card {
            background: var(--surface-white);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .daily-summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success), var(--accent-danger));
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .summary-item {
            text-align: center;
            padding: 0.5rem 1rem;
            position: relative;
            flex: 1;
            min-width: 120px;
        }

        .summary-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border-light), transparent);
        }

        .summary-item small {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
            display: block;
        }

        .summary-item .h4 {
            color: var(--text-primary);
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }

        #dayPnL, #netPnL, #tradeCount {
            font-size: 1.75rem;
            font-weight: 700;
        }

        /* ============== TRADES CONTAINER ============== */
        .trades-container {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .trades-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface-white);
        }

        .trades-table th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem;
            border-bottom: 2px solid var(--border-light);
            white-space: nowrap;
            text-align: left;
        }

        .trades-table td {
            padding: 1rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-light);
            font-size: 0.95rem;
        }

        .trades-table tbody tr {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .trades-table tbody tr:hover {
            background: var(--surface-hover);
            transform: scale(1.01);
            box-shadow: var(--shadow-sm);
        }

        /* Trade Direction Badges */
        .trades-table .long {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(39, 174, 96, 0.1);
            color: var(--accent-success);
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(39, 174, 96, 0.2);
        }

        .trades-table .short {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent-danger);
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        /* P&L Styling */
        .trades-table .profit {
            color: var(--accent-success);
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .trades-table .profit::before {
            content: '+';
            margin-right: 2px;
        }

        .trades-table .loss {
            color: var(--accent-danger);
            font-weight: 700;
        }

        /* Trade Link */
        .trade-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .trade-link:hover {
            color: var(--accent-hover);
            gap: 0.75rem;
        }

        .trade-link i {
            font-size: 0.8rem;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .trade-link:hover i {
            opacity: 1;
        }

        /* ============== FAB CONTAINER ============== */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .floating-btn {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            border: none;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .floating-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .floating-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .floating-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .floating-btn:active {
            transform: translateY(0) scale(1);
        }

        .btn-manual { 
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .btn-dhan { 
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        /* ============== EMPTY STATE ============== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .empty-state .btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .empty-state .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ============== LOADING STATE ============== */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--text-secondary);
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============== MODAL STYLES ============== */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            background: var(--surface-white);
            border-bottom: 1px solid var(--border-light);
            padding: 1.25rem 1.5rem;
        }

        .modal-header .modal-title {
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-header .btn-close {
            transition: all 0.2s ease;
        }

        .modal-header .btn-close:hover {
            transform: rotate(90deg);
        }

        .modal-body {
            background: var(--surface-white);
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            background: var(--surface-hover);
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.5rem;
        }

        .table {
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .table thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-light);
        }

        .table tbody td {
            vertical-align: middle;
            border-bottom: 1px solid var(--border-light);
        }

        .table tbody tr:hover {
            background: var(--surface-hover);
        }

        .badge {
            padding: 0.35rem 0.65rem;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent-primary);
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--text-muted);
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: var(--text-secondary);
            transform: translateY(-2px);
        }

        /* ============== RESPONSIVE BREAKPOINTS ============== */

        /* Mobile Devices (320px - 480px) */
        @media screen and (max-width: 480px) {
            .container {
                padding: 0 0.75rem;
            }
            
            main.container {
                margin-top: 70px;
            }
            
            .date-navigation {
                padding: 0.75rem;
                gap: 0.5rem;
                flex-direction: column;
            }
            
            .date-navigation button {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
                width: 100%;
                justify-content: center;
            }
            
            .date-navigation input[type="date"] {
                width: 100%;
                font-size: 0.85rem;
                min-width: auto;
            }
            
            .daily-summary-card {
                padding: 1rem;
                flex-direction: column !important;
                gap: 0.75rem;
            }
            
            .summary-item {
                width: 100%;
                padding: 0.5rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                min-width: auto;
            }
            
            .summary-item:not(:last-child)::after {
                display: none;
            }
            
            .summary-item small {
                font-size: 0.8rem;
                margin-bottom: 0;
                display: inline-block;
            }
            
            .summary-item .h4 {
                font-size: 1.25rem;
                display: inline-block;
                margin-left: 0.5rem;
            }
            
            #dayPnL, #netPnL, #tradeCount {
                font-size: 1.25rem;
            }
            
            .trades-container {
                overflow-x: auto;
            }
            
            .trades-table {
                min-width: 500px;
            }
            
            .trades-table th,
            .trades-table td {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }
            
            .fab-container {
                bottom: 20px;
                right: 20px;
                gap: 10px;
            }
            
            .floating-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .modal-dialog {
                margin: 0.5rem;
            }
        }

        /* Small Tablets (481px - 768px) */
        @media screen and (min-width: 481px) and (max-width: 768px) {
            .date-navigation {
                padding: 1rem;
                flex-wrap: nowrap;
            }
            
            .date-navigation button {
                padding: 0.6rem 1rem;
                white-space: nowrap;
            }
            
            .date-navigation input[type="date"] {
                min-width: 160px;
            }
            
            .daily-summary-card {
                padding: 1.25rem;
            }
            
            .summary-item .h4 {
                font-size: 1.5rem;
            }
            
            #dayPnL, #netPnL, #tradeCount {
                font-size: 1.5rem;
            }
            
            .trades-container {
                overflow-x: auto;
            }
            
            .trades-table {
                min-width: 600px;
            }
        }

        /* Tablets (769px - 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1rem;
            }
            
            .date-navigation {
                flex-wrap: nowrap;
            }
            
            .daily-summary-card {
                padding: 1.5rem;
            }
        }

        /* Landscape Mobile Optimization */
        @media screen and (max-height: 480px) and (orientation: landscape) {
            .date-navigation {
                margin-bottom: 1rem;
            }
            
            .daily-summary-card {
                margin-bottom: 1rem;
            }
            
            .fab-container {
                bottom: 10px;
                right: 10px;
                flex-direction: row;
                gap: 10px;
            }
            
            .floating-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .modal-dialog {
                max-height: 90vh;
                margin: 0.5rem auto;
            }
        }

        /* High-DPI Screens */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .navbar {
                backdrop-filter: blur(20px);
            }
        }

        /* Print Styles */
        @media print {
            .fab-container,
            .date-navigation button,
            .navbar,
            .modal {
                display: none !important;
            }
            
            .daily-summary-card,
            .trades-container {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }
            
            body {
                background: white;
            }
        }

        /* ============== ACCESSIBILITY ============== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        button:focus-visible,
        a:focus-visible,
        input:focus-visible {
            outline: 3px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Touch Target Sizes for Mobile */
        @media (hover: none) and (pointer: coarse) {
            button,
            .nav-link,
            .floating-btn {
                min-height: 44px;
                min-width: 44px;
            }
            
            .trades-table td {
                padding: 1.25rem 0.75rem;
            }
            
            .date-navigation button {
                min-height: 44px;
            }
        }

        /* ============== UTILITY CLASSES ============== */
        .text-success { color: var(--accent-success) !important; }
        .text-danger { color: var(--accent-danger) !important; }
        .text-primary { color: var(--accent-primary) !important; }
        .bg-primary { background: var(--accent-primary) !important; }
        
        .border-success { border-color: var(--accent-success) !important; }
        .border-danger { border-color: var(--accent-danger) !important; }
        .border-primary { border-color: var(--accent-primary) !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-hover);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <script>

        // PDF Processing Functions
        async function processDhanPDF(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    
                    const loadingTask = pdfjsLib.getDocument({
                        data: typedarray,
                        password: 'INEPM0439N', // Update with your password
                        cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/',
                        cMapPacked: true,
                    });

                    const pdf = await loadingTask.promise;
                    let fullText = "";

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ") + " \n";
                    }

                    // Auto-set Date from PDF
                    const dateMatch = fullText.match(/Trade Date:\s*(\d{2}-\d{2}-\d{4})/);
                    if (dateMatch) {
                        const [dd, mm, yyyy] = dateMatch[1].split('-');
                        document.getElementById('datePicker').value = `${yyyy}-${mm}-${dd}`;
                    }

                    // Parse trades
                    extractedTrades = parseDhanTrades(fullText);
                    
                    if (extractedTrades.length > 0) {
                        displayTradesForSelection(extractedTrades);
                    } else {
                        alert("No matching trade rows found. Check your Dhan PDF format.");
                    }

                } catch (err) {
                    console.error("PDF Error:", err);
                    alert(err.name === 'PasswordException' ? "Decryption failed. Check password." : "Error reading PDF.");
                } finally {
                    input.value = "";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseDhanTrades(text) {
            const tradesMap = {}; 
            const finalTrades = [];
            const cleanText = text.replace(/\s+/g, ' ');

            const regex = /(OPTIDX|OPTSTK|EQ)\s+(.*?)\s+(?:-\s+NSE|NSE|BSE)?\s+(B|S-?)\s+(\d+)\s+(\d+\.\d+)/g;
            
            let match;
            while ((match = regex.exec(cleanText)) !== null) {
                const type = match[1];
                let details = match[2].split(" ").slice(0, 5).join(" ").trim();
                const fullSymbol = `${type} ${details}`.replace(/- NSE|NSE|BSE/g, '').trim();
                
                const sideRaw = match[3];
                const qty = parseInt(match[4]);
                const price = parseFloat(match[5]);
                const side = sideRaw.startsWith('B') ? "BUY" : "SELL";

                if (!tradesMap[fullSymbol]) tradesMap[fullSymbol] = { BUY: [], SELL: [] };
                tradesMap[fullSymbol][side].push({ qty, price });
            }

            for (const sym in tradesMap) {
                const buys = tradesMap[sym].BUY;
                const sells = tradesMap[sym].SELL;
                
                if (buys.length > 0 && sells.length > 0) {
                    const totalBuyQty = buys.reduce((s, b) => s + b.qty, 0);
                    const avgBuyPrice = buys.reduce((s, b) => s + (b.price * b.qty), 0) / totalBuyQty;
                    const totalSellQty = sells.reduce((s, b) => s + b.qty, 0);
                    const avgSellPrice = sells.reduce((s, b) => s + (b.price * b.qty), 0) / totalSellQty;

                    const tradeQty = Math.min(totalBuyQty, totalSellQty);
                    const pnl = (avgSellPrice - avgBuyPrice) * tradeQty;

                    finalTrades.push({
                        symbol: sym,
                        direction: "LONG", 
                        quantity: tradeQty,
                        entryPrice: avgBuyPrice.toFixed(2),
                        exitPrice: avgSellPrice.toFixed(2),
                        pnl: pnl.toFixed(2)
                    });
                }
            }
            
            return Array.from(new Map(finalTrades.map(t => [t.symbol + t.pnl, t])).values());
        }

        function displayTradesForSelection(trades) {
            const tbody = document.getElementById('parsedTradesTable');
            if (trades.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-4 text-muted">
                            <i class="fas fa-exclamation-circle me-2"></i>
                            No trades found in PDF
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = trades.map((t, i) => `
                <tr class="align-middle">
                    <td class="ps-3">
                        <input type="checkbox" class="trade-check" data-index="${i}" 
                               onchange="updateSelectedCount()" checked>
                    </td>
                    <td>
                        <div class="fw-bold text-dark" style="font-size: 0.9rem;">${t.symbol}</div>
                        <small class="text-muted">Imported Trade</small>
                    </td>
                    <td><span class="badge bg-light text-dark border">${t.quantity}</span></td>
                    <td>
                        <span class="text-muted small">₹${t.entryPrice}</span> 
                        <i class="fas fa-arrow-right mx-1 text-primary small"></i> 
                        <span class="text-muted small">₹${t.exitPrice}</span>
                    </td>
                    <td class="${t.pnl >= 0 ? 'text-success' : 'text-danger'} fw-bold">
                        ${t.pnl >= 0 ? '+' : ''}₹${t.pnl}
                    </td>
                </tr>
            `).join('');
            
            updateSelectedCount();
            importModal.show();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('.trade-check:checked').length;
            document.getElementById('selectedCount').innerText = count;
            
            const selectAll = document.getElementById('selectAllTrades');
            const total = document.querySelectorAll('.trade-check').length;
            if (selectAll) {
                selectAll.checked = count === total && total > 0;
                selectAll.indeterminate = count > 0 && count < total;
            }
        }

        function toggleAllTrades(source) {
            document.querySelectorAll('.trade-check').forEach(cb => cb.checked = source.checked);
            updateSelectedCount();
        }

        async function importSelectedTrades() {
            const selectedIdx = Array.from(document.querySelectorAll('.trade-check:checked')).map(cb => cb.dataset.index);
            if (selectedIdx.length === 0) {
                alert("Select at least one position to import.");
                return;
            }

            const date = document.getElementById('datePicker').value;
            
            // Here you'll implement Firebase save
            console.log('Importing trades for date:', date);
            console.log('Selected trades:', selectedIdx.map(i => extractedTrades[i]));

            importModal.hide();
            
            // Show success message
            alert(`Success! ${selectedIdx.length} positions imported.`);
            
            // Refresh the journal view
            renderJournal(date);
        }

        // Handle paste import (if needed)
        function handlePasteImport(rawText) {
            if (!rawText || rawText.length < 20) return;

            const dateMatch = rawText.match(/(\d{2}-\d{2}-\d{4})/);
            if (dateMatch) {
                const [dd, mm, yyyy] = dateMatch[1].split('-');
                const formattedDate = `${yyyy}-${mm}-${dd}`;
                document.getElementById('datePicker').value = formattedDate;
            }

            extractedTrades = [];
            const tradesMap = {};
            
            const regex = /(OPTIDX|OPTSTK|EQ)\s+([A-Z0-9\s]+NSE)\s+([BS])\s+(\d+)\s+(\d+\.\d+)/g;
            
            let match;
            const cleanText = rawText.replace(/\n/g, ' ');

            while ((match = regex.exec(cleanText)) !== null) {
                const symbol = match[1] + " " + match[2].replace(' NSE', '').trim();
                const side = match[3] === 'B' ? 'BUY' : 'SELL';
                const qty = parseInt(match[4]);
                const price = parseFloat(match[5]);

                if (!tradesMap[symbol]) tradesMap[symbol] = { BUY: null, SELL: null };
                tradesMap[symbol][side] = { qty, price };
            }

            for (const symbol in tradesMap) {
                const leg = tradesMap[symbol];
                if (leg.BUY && leg.SELL) {
                    const pnl = (leg.SELL.price - leg.BUY.price) * leg.BUY.qty;
                    extractedTrades.push({
                        symbol: symbol,
                        direction: "LONG",
                        quantity: leg.BUY.qty,
                        entryPrice: leg.BUY.price,
                        exitPrice: leg.SELL.price,
                        pnl: pnl.toFixed(2)
                    });
                }
            }

            if (extractedTrades.length > 0) {
                displayTradesForSelection(extractedTrades);
            }
        }
    </script>
