<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Journal - Trade Journal Pro</title>
    
    <!-- Original Bootstrap & Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Original Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        /* ============== 60-30-10 COLOR SCHEME ============== */
        :root {
            /* 60% - Primary Background */
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            
            /* 30% - Secondary Surface */
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            
            /* 10% - Accent Colors */
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            
            /* Text Colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            
            /* Spacing */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            
            body {
                background: var(--bg-gradient);
            }
            
            .navbar {
                background: rgba(15, 23, 42, 0.95) !important;
            }
            
            .daily-summary-card {
                background: var(--surface-white);
                border-color: var(--border-light);
            }
            
            .summary-item:not(:last-child)::after {
                background: linear-gradient(to bottom, transparent, var(--border-light), transparent);
            }
            
            .trades-table {
                background: var(--surface-white);
                border-color: var(--border-light);
            }
            
            .trades-table th {
                background: var(--surface-hover);
                color: var(--text-secondary);
                border-bottom-color: var(--border-light);
            }
            
            .trades-table td {
                border-bottom-color: var(--border-light);
                color: var(--text-primary);
            }
            
            .trades-table tbody tr:hover {
                background: var(--surface-hover);
            }
            
            .text-muted {
                color: var(--text-secondary) !important;
            }
            
            .btn-outline-primary {
                border-color: var(--accent-primary);
                color: var(--accent-primary);
            }
            
            .btn-outline-primary:hover {
                background: var(--accent-primary);
                color: white;
            }
            
            .form-control {
                background: var(--surface-white);
                border-color: var(--border-light);
                color: var(--text-primary);
            }
            
            .form-control:focus {
                background: var(--surface-white);
                border-color: var(--accent-primary);
                color: var(--text-primary);
            }
            
            .modal-content {
                background: var(--surface-white);
                border-color: var(--border-light);
            }
            
            .table {
                color: var(--text-primary);
            }
            
            .table-light {
                background: var(--surface-hover);
                color: var(--text-secondary);
            }
            
            .table-light th {
                background: var(--surface-hover);
                color: var(--text-secondary);
                border-color: var(--border-light);
            }
            
            .table td, .table th {
                border-color: var(--border-light);
            }
            
            .table-hover tbody tr:hover {
                background: var(--surface-hover);
                color: var(--text-primary);
            }
            
            .bg-light {
                background: var(--surface-hover) !important;
            }
            
            .border-start {
                border-left-color: var(--border-light) !important;
            }
            
            .btn-secondary {
                background: var(--text-muted);
                border-color: var(--text-muted);
            }
            
            .btn-secondary:hover {
                background: var(--text-secondary);
                border-color: var(--text-secondary);
            }
            
            .text-dark {
                color: var(--text-primary) !important;
            }
            
            .badge.bg-light {
                background: var(--surface-hover) !important;
                color: var(--text-primary) !important;
                border-color: var(--border-light) !important;
            }
            
            .btn-close {
                filter: invert(1) grayscale(100%) brightness(200%);
            }
            
            .text-success {
                color: #2ecc71 !important;
            }
            
            .text-danger {
                color: #e74c3c !important;
            }
        }

        /* Base Styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* Modern Navigation - Enhanced but preserving original structure */
        .navbar {
            background: #2c3e50 !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-md);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        /* Enhanced Date Navigation */
        .date-navigation {
            background: var(--surface-white);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-lg);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border: 1px solid var(--border-light);
        }

        .date-navigation button {
            padding: 0.6rem 1.2rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }

        .date-navigation button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .date-navigation button:active {
            transform: translateY(0);
        }

        .date-navigation input[type="date"] {
            padding: 0.6rem 1rem;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            color: var(--text-primary);
            background: var(--surface-white);
            font-family: 'Inter', sans-serif;
            min-width: 200px;
        }

        .date-navigation input[type="date"]:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        /* Enhanced Daily Summary Card */
        .daily-summary-card {
            background: var(--surface-white);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .daily-summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success), var(--accent-danger));
        }

        .summary-item {
            text-align: center;
            padding: 0.5rem 1rem;
            position: relative;
        }

        .summary-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border-light), transparent);
        }

        .summary-item small {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
            display: block;
        }

        .summary-item .h4 {
            color: var(--text-primary);
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }

        /* Enhanced Trades Container */
        .trades-container {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--border-light);
            margin-top: 1.5rem;
        }

        .trades-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface-white);
            margin-bottom: 0;
        }

        .trades-table th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem;
            border-bottom: 2px solid var(--border-light);
            white-space: nowrap;
        }

        .trades-table td {
            padding: 1rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-light);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .trades-table tbody tr {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .trades-table tbody tr:hover {
            background: var(--surface-hover);
            transform: scale(1.01);
            box-shadow: var(--shadow-sm);
        }

        /* Direction Badges */
        .trades-table .long, 
        .trades-table td:contains("📈") {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(39, 174, 96, 0.1);
            color: var(--accent-success) !important;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(39, 174, 96, 0.2);
        }

        .trades-table .short,
        .trades-table td:contains("📉") {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(231, 76, 60, 0.1);
            color: var(--accent-danger) !important;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        /* P&L Styling */
        .trades-table .profit {
            color: var(--accent-success) !important;
            font-weight: 700;
        }

        .trades-table .loss {
            color: var(--accent-danger) !important;
            font-weight: 700;
        }

        /* Delete Button */
        .btn-sm.btn-danger {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            color: var(--accent-danger);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-sm.btn-danger:hover {
            background: var(--accent-danger);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .empty-state p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1rem;
        }

        /* FAB Container - Preserved original but enhanced */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .floating-btn {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            border: none;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
        }

        .floating-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            color: white;
        }

        .btn-manual { 
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .btn-dhan { 
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        /* Enhanced Modal */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            background: var(--surface-white);
        }

        .modal-header {
            background: var(--accent-primary) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1.25rem 1.5rem;
        }

        .modal-header .modal-title {
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-header .btn-close-white {
            filter: brightness(0) invert(1);
        }

        .modal-body {
            padding: 0;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            background: var(--surface-hover);
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.5rem;
        }

        /* Table Enhancements */
        .table {
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .table thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-light);
            padding: 1rem;
        }

        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-light);
        }

        .table tbody tr:hover {
            background: var(--surface-hover);
        }

        .badge {
            padding: 0.35rem 0.65rem;
            font-weight: 500;
            border-radius: var(--radius-full);
        }

        .badge.bg-light {
            background: var(--surface-hover) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-light);
        }

        /* Button Enhancements */
        .btn-primary {
            background: var(--accent-primary);
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-radius: var(--radius-md);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--text-muted);
            border: none;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-radius: var(--radius-md);
        }

        .btn-secondary:hover {
            background: var(--text-secondary);
            transform: translateY(-2px);
        }

        .btn-outline-primary {
            border: 2px solid var(--accent-primary);
            color: var(--accent-primary);
            background: transparent;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border-radius: var(--radius-md);
        }

        .btn-outline-primary:hover {
            background: var(--accent-primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-hover);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ============== RESPONSIVE BREAKPOINTS ============== */

        /* Mobile Devices (up to 768px) */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            
            .date-navigation {
                flex-direction: column;
                gap: 0.75rem;
                padding: 1rem;
            }
            
            .date-navigation button {
                width: 100%;
                justify-content: center;
                padding: 0.75rem;
            }
            
            .date-navigation input[type="date"] {
                width: 100%;
                min-width: auto;
            }
            
            .daily-summary-card {
                flex-direction: column !important;
                gap: 1rem;
                padding: 1rem;
            }
            
            .summary-item {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.5rem 0;
            }
            
            .summary-item:not(:last-child)::after {
                display: none;
            }
            
            .summary-item small {
                margin-bottom: 0;
                display: inline-block;
            }
            
            .summary-item .h4 {
                font-size: 1.25rem;
                display: inline-block;
            }
            
            .trades-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .trades-table {
                min-width: 700px;
            }
            
            .trades-table th,
            .trades-table td {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
            
            .fab-container {
                bottom: 20px;
                right: 20px;
                gap: 10px;
            }
            
            .floating-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            
            .modal-dialog {
                margin: 0.5rem;
            }
            
            .navbar-brand {
                font-size: 1.1rem;
            }
            
            .nav-link {
                padding: 0.4rem 0.8rem !important;
                font-size: 0.9rem;
            }
        }

        /* Small phones (up to 480px) */
        @media screen and (max-width: 480px) {
            .summary-item .h4 {
                font-size: 1.1rem;
            }
            
            .trades-table {
                min-width: 600px;
                font-size: 0.85rem;
            }
            
            .trades-table th,
            .trades-table td {
                padding: 0.6rem 0.4rem;
            }
            
            .floating-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
            
            .btn-sm.btn-danger {
                padding: 0.25rem 0.5rem;
                font-size: 0.75rem;
            }
        }

        /* Tablets (769px - 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1rem;
            }
            
            .date-navigation {
                flex-wrap: nowrap;
            }
            
            .trades-table th,
            .trades-table td {
                padding: 0.75rem;
            }
        }

        /* Landscape Mobile Optimization */
        @media screen and (max-height: 480px) and (orientation: landscape) {
            .date-navigation {
                margin-bottom: 1rem;
            }
            
            .daily-summary-card {
                margin-bottom: 1rem;
            }
            
            .fab-container {
                bottom: 10px;
                right: 10px;
                flex-direction: row;
                gap: 10px;
            }
            
            .floating-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }

        /* Accessibility - Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Focus States */
        button:focus-visible,
        a:focus-visible,
        input:focus-visible {
            outline: 3px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Touch Target Sizes for Mobile */
        @media (hover: none) and (pointer: coarse) {
            button,
            .nav-link,
            .floating-btn,
            .btn-sm.btn-danger {
                min-height: 44px;
                min-width: 44px;
            }
            
            .trades-table td {
                padding: 1rem 0.75rem;
            }
            
            .date-navigation button {
                min-height: 48px;
            }
        }

        /* Keep original color classes */
        .profit { color: #2ecc71 !important; font-weight: bold; }
        .loss { color: #e74c3c !important; font-weight: bold; }
        
        /* Ensure text colors in tables */
        .trades-table .profit { color: #2ecc71 !important; }
        .trades-table .loss { color: #e74c3c !important; }
        .trades-table .long { color: #27ae60 !important; }
        .trades-table .short { color: #e74c3c !important; }
    </style>
</head>
<body>
    <!-- Original Navigation - Enhanced but same structure -->

    <!-- Original JavaScript functions - 100% preserved -->
    <script>
        function handlePasteImport(rawText) {
            if (!rawText || rawText.length < 20) return;

            const dateMatch = rawText.match(/(\d{2}-\d{2}-\d{4})/);
            if (dateMatch) {
                const [dd, mm, yyyy] = dateMatch[1].split('-');
                const formattedDate = `${yyyy}-${mm}-${dd}`;
                document.getElementById('datePicker').value = formattedDate;
                document.getElementById('targetDateLabel').innerText = formattedDate;
            }

            extractedTrades = [];
            const tradesMap = {};
            
            const regex = /(OPTIDX|OPTSTK|EQ)\s+([A-Z0-9\s]+NSE)\s+([BS])\s+(\d+)\s+(\d+\.\d+)/g;
            
            let match;
            const cleanText = rawText.replace(/\n/g, ' ');

            while ((match = regex.exec(cleanText)) !== null) {
                const symbol = match[1] + " " + match[2].replace(' NSE', '').trim();
                const side = match[3] === 'B' ? 'BUY' : 'SELL';
                const qty = parseInt(match[4]);
                const price = parseFloat(match[5]);

                if (!tradesMap[symbol]) tradesMap[symbol] = { BUY: null, SELL: null };
                tradesMap[symbol][side] = { qty, price };
            }

            for (const symbol in tradesMap) {
                const leg = tradesMap[symbol];
                if (leg.BUY && leg.SELL) {
                    const pnl = (leg.SELL.price - leg.BUY.price) * leg.BUY.qty;
                    extractedTrades.push({
                        symbol: symbol,
                        direction: "LONG",
                        quantity: leg.BUY.qty,
                        entryPrice: leg.BUY.price,
                        exitPrice: leg.SELL.price,
                        pnl: pnl.toFixed(2)
                    });
                }
            }

            if (extractedTrades.length > 0) {
                displayTradesForSelection(extractedTrades);
                document.getElementById('selectionSection').style.display = 'block';
            }
        }

        function displayTradesForSelection(trades) {
            const tbody = document.getElementById('parsedTradesTable');
            tbody.innerHTML = trades.map((t, i) => `
                <tr>
                    <td><input type="checkbox" class="trade-check" data-index="${i}" checked></td>
                    <td><small>${t.symbol}</small></td>
                    <td>${t.quantity}</td>
                    <td>₹${t.entryPrice} <i class="fas fa-arrow-right"></i> ₹${t.exitPrice}</td>
                    <td class="${t.pnl >= 0 ? 'text-success' : 'text-danger'} fw-bold">₹${t.pnl}</td>
                </tr>
            `).join('');
        }

        async function importSelectedTrades() {
            const selectedIdx = Array.from(document.querySelectorAll('.trade-check:checked')).map(cb => cb.dataset.index);
            const date = document.getElementById('datePicker').value;

            for (let idx of selectedIdx) {
                const trade = extractedTrades[idx];
                await TradeJournal.saveTrade(date, {
                    ...trade,
                    strategy: "Quick Paste Import",
                    notes: "Imported via Dhan Table Paste"
                }, []);
            }

            const modal = bootstrap.Modal.getInstance(document.getElementById('importModal'));
            modal.hide();
            document.getElementById('pasteArea').value = '';
            renderJournal(date);
            alert("Import Complete!");
        }

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        let extractedTrades = [];
        let importModal = null;

        document.addEventListener('DOMContentLoaded', () => {
            importModal = new bootstrap.Modal(document.getElementById('importModal'));
        });

        async function processDhanPDF(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    
                    const loadingTask = pdfjsLib.getDocument({
                        data: typedarray,
                        password: 'INEPM0439N',
                        cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/',
                        cMapPacked: true,
                    });

                    const pdf = await loadingTask.promise;
                    let fullText = "";

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(item => item.str).join(" ") + " \n";
                    }

                    const dateMatch = fullText.match(/Trade Date:\s*(\d{2}-\d{2}-\d{4})/);
                    if (dateMatch) {
                        const [dd, mm, yyyy] = dateMatch[1].split('-');
                        document.getElementById('datePicker').value = `${yyyy}-${mm}-${dd}`;
                    }

                    extractedTrades = parseDhanTrades(fullText);
                    
                    if (extractedTrades.length > 0) {
                        displayTradesForSelection(extractedTrades);
                    } else {
                        alert("Decrypted, but no matching trade rows found. Check your Dhan PDF format.");
                    }

                } catch (err) {
                    console.error("PDF Engine Error:", err);
                    alert(err.name === 'PasswordException' ? "Decryption failed. Check password." : "Error reading PDF.");
                } finally {
                    input.value = "";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function parseDhanTrades(text) {
            const tradesMap = {}; 
            const finalTrades = [];
            const cleanText = text.replace(/\s+/g, ' ');

            const regex = /(OPTIDX|OPTSTK|EQ)\s+(.*?)\s+(?:-\s+NSE|NSE|BSE)?\s+(B|S-?)\s+(\d+)\s+(\d+\.\d+)/g;
            
            let match;
            while ((match = regex.exec(cleanText)) !== null) {
                const type = match[1];
                let details = match[2].split(" ").slice(0, 5).join(" ").trim();
                const fullSymbol = `${type} ${details}`.replace(/- NSE|NSE|BSE/g, '').trim();
                
                const sideRaw = match[3];
                const qty = parseInt(match[4]);
                const price = parseFloat(match[5]);
                const side = sideRaw.startsWith('B') ? "BUY" : "SELL";

                if (!tradesMap[fullSymbol]) tradesMap[fullSymbol] = { BUY: [], SELL: [] };
                tradesMap[fullSymbol][side].push({ qty, price });
            }

            for (const sym in tradesMap) {
                const buys = tradesMap[sym].BUY;
                const sells = tradesMap[sym].SELL;
                
                if (buys.length > 0 && sells.length > 0) {
                    const totalBuyQty = buys.reduce((s, b) => s + b.qty, 0);
                    const avgBuyPrice = buys.reduce((s, b) => s + (b.price * b.qty), 0) / totalBuyQty;
                    const totalSellQty = sells.reduce((s, b) => s + b.qty, 0);
                    const avgSellPrice = sells.reduce((s, b) => s + (b.price * b.qty), 0) / totalSellQty;

                    const tradeQty = Math.min(totalBuyQty, totalSellQty);
                    const pnl = (avgSellPrice - avgBuyPrice) * tradeQty;

                    finalTrades.push({
                        symbol: sym,
                        direction: "LONG", 
                        quantity: tradeQty,
                        entryPrice: avgBuyPrice.toFixed(2),
                        exitPrice: avgSellPrice.toFixed(2),
                        pnl: pnl.toFixed(2)
                    });
                }
            }
            return Array.from(new Map(finalTrades.map(t => [t.symbol + t.pnl, t])).values());
        }

        // Override displayTradesForSelection to match original
        const originalDisplayTradesForSelection = displayTradesForSelection;
        displayTradesForSelection = function(trades) {
            const tbody = document.getElementById('parsedTradesTable');
            tbody.innerHTML = trades.map((t, i) => `
                <tr class="align-middle">
                    <td class="ps-3"><input type="checkbox" class="trade-check" data-index="${i}" onchange="updateSelectedCount()" checked></td>
                    <td>
                        <div class="fw-bold text-dark" style="font-size: 0.9rem;">${t.symbol}</div>
                        <small class="text-muted">Imported Trade</small>
                    </td>
                    <td><span class="badge bg-light text-dark border">${t.quantity}</span></td>
                    <td>
                        <span class="text-muted small">₹${t.entryPrice}</span> 
                        <i class="fas fa-arrow-right mx-1 text-primary small"></i> 
                        <span class="text-muted small">₹${t.exitPrice}</span>
                    </td>
                    <td class="${t.pnl >= 0 ? 'text-success' : 'text-danger'} fw-bold">
                        ${t.pnl >= 0 ? '+' : ''}₹${t.pnl}
                    </td>
                </tr>
            `).join('');
            
            updateSelectedCount();
            importModal.show();
        };

        function updateSelectedCount() {
            const count = document.querySelectorAll('.trade-check:checked').length;
            document.getElementById('selectedCount').innerText = count;
        }

        function toggleAllTrades(source) {
            document.querySelectorAll('.trade-check').forEach(cb => cb.checked = source.checked);
            updateSelectedCount();
        }

        async function importSelectedTrades() {
            const selectedIdx = Array.from(document.querySelectorAll('.trade-check:checked')).map(cb => cb.dataset.index);
            if (selectedIdx.length === 0) return alert("Select at least one position to import.");

            const date = document.getElementById('datePicker').value;
            
            for (let idx of selectedIdx) {
                const trade = extractedTrades[idx];
                await TradeJournal.saveTrade(date, {
                    ...trade,
                    strategy: "Dhan PDF Import",
                    notes: "Position auto-extracted from Contact Note."
                }, []);
            }

            importModal.hide();
            renderJournal(date);
            alert(`Success! ${selectedIdx.length} positions imported.`);
        }

        function changeDateBy(days) {
            const picker = document.getElementById('datePicker');
            let current = new Date(picker.value);
            current.setDate(current.getDate() + days);
            const newDateStr = current.toISOString().split('T')[0];
            picker.value = newDateStr;
            renderJournal(newDateStr);
        }
    </script>
