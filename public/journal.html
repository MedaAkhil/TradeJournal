<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Add Trade - Trade Journal Pro</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        /* ============== 60-30-10 COLOR SCHEME (Matching all pages) ============== */
        :root {
            /* 60% - Primary Background */
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            
            /* 30% - Secondary Surface */
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            
            /* 10% - Accent Colors */
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            
            /* Text Colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            
            body {
                background: var(--bg-gradient);
            }
            
            .form-control, .form-select {
                background: var(--surface-white);
                border-color: var(--border-light);
                color: var(--text-primary);
            }
            
            .form-control:focus, .form-select:focus {
                background: var(--surface-white);
                border-color: var(--accent-primary);
                color: var(--text-primary);
            }
            
            .bg-light {
                background: var(--surface-hover) !important;
            }
            
            .border {
                border-color: var(--border-light) !important;
            }
            
            .modal-content {
                background: var(--surface-white);
                border-color: var(--border-light);
            }
            
            .modal-header, .modal-footer {
                background: var(--surface-hover);
                border-color: var(--border-light);
            }
            
            .drawing-tools {
                background: var(--surface-white) !important;
                border-color: var(--border-light) !important;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Modern Navigation - Matching all pages */
        .navbar {
            background: #2c3e50 !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-md);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-brand i {
            -webkit-text-fill-color: white;
            color: white;
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Form Container */
        #tradeForm {
            background: var(--surface-white) !important;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        #tradeForm::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success));
        }

        /* Form Title */
        h2 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
        }

        h2 .text-primary {
            color: var(--accent-primary) !important;
        }

        h4 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h4 i {
            color: var(--accent-primary);
        }

        /* Form Labels */
        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .form-label.fw-bold.text-success {
            color: var(--accent-success) !important;
        }

        .form-label.fw-bold.text-danger {
            color: var(--accent-danger) !important;
        }

        /* Form Controls */
        .form-control, .form-select {
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            background: var(--surface-white);
            color: var(--text-primary);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        /* Readonly P&L Field */
        #pnl {
            background: var(--surface-hover) !important;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        /* Screenshot Section */
        .screenshot-section {
            background: var(--surface-hover) !important;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-top: 1rem;
        }

        .screenshot-section .form-label {
            margin-bottom: 1rem;
        }

        /* Button Styles */
        .btn-outline-secondary {
            border: 2px solid var(--border-light);
            color: var(--text-secondary);
            background: transparent;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .btn-outline-secondary:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Preview Grid */
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .preview-grid .position-relative {
            background: var(--surface-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .preview-grid .position-relative:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .preview-grid img {
            border-radius: var(--radius-sm);
            object-fit: cover;
        }

        /* Save Button */
        .btn-success {
            background: linear-gradient(135deg, var(--accent-success), #229954);
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            filter: brightness(1.05);
        }

        /* FAB Container */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }

        .fab {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .fab:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .fab-contract {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        /* Today's Log Table */
        .table-responsive {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
            color: var(--text-primary);
        }

        .table thead th {
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem;
            border-bottom: 2px solid var(--border-light);
        }

        .table tbody td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .table tbody tr:hover {
            background: var(--surface-hover);
        }

        .table .profit {
            color: var(--accent-success);
            font-weight: 600;
        }

        .table .loss {
            color: var(--accent-danger);
            font-weight: 600;
        }

        /* Modal Styling */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            background: var(--surface-hover);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 1.25rem;
        }

        .modal-header .modal-title {
            color: var(--text-primary);
            font-weight: 600;
        }

        .modal-footer {
            background: var(--surface-hover);
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.25rem;
        }

        /* Drawing Tools */
        .drawing-tools {
            background: var(--surface-white) !important;
            border-bottom: 1px solid var(--border-light);
            padding: 1rem;
        }

        .drawing-tools .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .drawing-tools .btn-sm:hover {
            transform: translateY(-1px);
        }

        .drawing-tools .btn-outline-primary.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .form-range {
            width: 100px;
        }

        .form-control-color {
            width: 40px;
            height: 38px;
            padding: 0;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
        }

        /* Canvas Wrapper */
        #canvasWrapper {
            background: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        #drawingCanvas {
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            cursor: crosshair;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-hover);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ============== RESPONSIVE DESIGN ============== */
        
        /* Mobile devices (up to 768px) */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0 0.75rem;
            }

            h2 {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }

            h4 {
                font-size: 1.1rem;
            }

            #tradeForm {
                padding: 1.25rem;
            }

            .row {
                margin: 0;
            }

            .col-md-3, .col-md-6 {
                padding: 0 0.5rem;
                margin-bottom: 0.75rem;
            }

            .form-control, .form-select {
                padding: 0.5rem 0.75rem;
                font-size: 0.9rem;
            }

            .btn-outline-secondary {
                padding: 0.4rem 0.75rem;
                font-size: 0.85rem;
            }

            .screenshot-section {
                padding: 1rem;
            }

            .preview-grid .position-relative {
                width: 100px;
            }

            .preview-grid img {
                width: 90px;
                height: 70px;
            }

            .fab {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .fab-container {
                bottom: 20px;
                right: 20px;
            }

            .table-responsive {
                font-size: 0.85rem;
            }

            .table thead th, .table tbody td {
                padding: 0.6rem;
            }

            .modal-dialog {
                margin: 0.5rem;
            }

            .drawing-tools {
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .drawing-tools .btn-sm {
                padding: 0.3rem 0.6rem;
                font-size: 0.75rem;
            }
        }

        /* Small phones (up to 480px) */
        @media screen and (max-width: 480px) {
            h2 {
                font-size: 1.25rem;
            }

            h4 {
                font-size: 1rem;
            }

            #tradeForm {
                padding: 1rem;
            }

            .form-label {
                font-size: 0.75rem;
            }

            .preview-grid {
                gap: 0.5rem;
            }

            .preview-grid .position-relative {
                width: 80px;
            }

            .preview-grid img {
                width: 70px;
                height: 55px;
            }

            .btn-outline-secondary {
                padding: 0.3rem 0.6rem;
                font-size: 0.75rem;
            }

            .fab {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }

        /* Tablets (769px - 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1rem;
            }

            #tradeForm {
                padding: 1.5rem;
            }
        }

        /* Accessibility - Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Focus States */
        button:focus-visible,
        .form-control:focus-visible,
        .form-select:focus-visible {
            outline: 3px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Touch Target Sizes */
        @media (hover: none) and (pointer: coarse) {
            button,
            .btn,
            .form-control,
            .form-select,
            .fab {
                min-height: 44px;
            }
            
            .btn-outline-secondary {
                min-height: 40px;
            }
        }

        /* Print Styles */
        @media print {
            .navbar,
            .fab-container,
            .btn-success,
            .btn-outline-secondary,
            .screenshot-section {
                display: none !important;
            }
            
            #tradeForm {
                box-shadow: none;
                border: 1px solid #ddd;
                padding: 1rem;
            }
            
            body {
                background: white;
            }
        }

        /* Utility Classes */
        .bg-light {
            background: var(--surface-hover) !important;
        }

        .shadow-sm {
            box-shadow: var(--shadow-sm) !important;
        }

        .rounded {
            border-radius: var(--radius-md) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-chart-line me-2"></i>Trade Journal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-book me-1"></i>Journal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="calendar.html">
                            <i class="fas fa-calendar me-1"></i>Calendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-chart-pie me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="export.html">
                            <i class="fas fa-download me-1"></i>Backup
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="mb-4">
            <i class="fas fa-plus-circle me-2 text-primary"></i>
            Add Trade for <span id="displayDate" class="text-primary"></span>
        </h2>
        
        <form id="tradeForm" class="p-4 shadow-sm rounded">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-tag me-1"></i> Symbol
                    </label>
                    <input type="text" id="symbol" class="form-control" placeholder="e.g., NIFTY 22400 CE" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-arrow-right me-1"></i> Direction
                    </label>
                    <select id="direction" class="form-select">
                        <option value="LONG">📈 LONG (Buy)</option>
                        <option value="SHORT">📉 SHORT (Sell)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-arrow-down me-1"></i> Entry Price
                    </label>
                    <input type="number" id="entryPrice" class="form-control" step="0.01" placeholder="0.00" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-arrow-up me-1"></i> Exit Price
                    </label>
                    <input type="number" id="exitPrice" class="form-control" step="0.01" placeholder="0.00">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold text-success">
                        <i class="fas fa-bullseye me-1"></i> Take Profit
                    </label>
                    <input type="number" id="takeProfit" class="form-control" step="0.01" placeholder="Optional">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold text-danger">
                        <i class="fas fa-shield-alt me-1"></i> Stop Loss
                    </label>
                    <input type="number" id="stopLoss" class="form-control" step="0.01" placeholder="Optional">
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-cubes me-1"></i> Quantity
                    </label>
                    <input type="number" id="quantity" class="form-control" placeholder="0" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-clock me-1"></i> Entry Time
                    </label>
                    <input type="time" id="entryTime" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-clock me-1"></i> Exit Time
                    </label>
                    <input type="time" id="exitTime" class="form-control">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-chart-line me-1"></i> Strategy
                    </label>
                    <select id="strategy" class="form-select">
                        <option value="">Select Strategy</option>
                        <option value="Breakout">Breakout</option>
                        <option value="Pullback">Pullback</option>
                        <option value="Reversal">Reversal</option>
                        <option value="Trend Following">Trend Following</option>
                        <option value="Range Trading">Range Trading</option>
                        <option value="Scalping">Scalping</option>
                        <option value="Swing Trading">Swing Trading</option>
                        <option value="News Trading">News Trading</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">
                        <i class="fas fa-calculator me-1"></i> Calculated P&L
                    </label>
                    <input type="number" id="pnl" class="form-control fw-bold" readonly>
                </div>
            </div>

            <div class="screenshot-section mt-4 p-3 rounded border">
                <label class="form-label fw-bold">
                    <i class="fas fa-camera me-2"></i> Screenshots with Annotations
                </label>
                <div class="d-flex gap-2 mb-3 flex-wrap">
                    <button type="button" class="btn btn-outline-secondary" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-folder-open me-1"></i> Browse
                    </button>
                    <button type="button" class="btn btn-outline-secondary" id="pasteBtn">
                        <i class="fas fa-paste me-1"></i> Paste (Ctrl+V)
                    </button>
                    <button type="button" class="btn btn-outline-secondary" onclick="openCameraModal()">
                        <i class="fas fa-camera me-1"></i> Take Photo
                    </button>
                    <input type="file" id="fileInput" multiple accept="image/*" class="d-none">
                </div>
                <div id="previewGrid" class="preview-grid d-flex flex-wrap gap-2"></div>
            </div>

            <div class="mb-3 mt-4">
                <label class="form-label fw-bold">
                    <i class="fas fa-sticky-note me-1"></i> Trade Notes
                </label>
                <textarea id="notes" class="form-control" rows="3" placeholder="Setup details, emotions, or mistakes..."></textarea>
            </div>

            <button type="submit" id="saveTradeBtn" class="btn btn-success w-100 py-2 fw-bold">
                <i class="fas fa-save me-2"></i> SAVE TRADE
            </button>
        </form>

        <div class="mt-5">
            <h4><i class="fas fa-history me-2"></i> Today's Log</h4>
            <div id="todaysTradesList" class="table-responsive"></div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab fab-contract" onclick="openContractModal()" title="Import PDF">
            <i class="fas fa-file-invoice"></i>
        </button>
    </div>

    <div id="drawingModal" class="modal bg-dark bg-opacity-75">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-edit me-2"></i>Annotate Screenshot
                    </h5>
                    <div class="ms-auto d-flex gap-2">
                        <button class="btn btn-outline-secondary btn-sm" onclick="undo()" title="Undo">
                            <i class="fas fa-undo"></i>
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="redo()" title="Redo">
                            <i class="fas fa-redo"></i>
                        </button>
                        <button type="button" class="btn-close" onclick="closeDrawingModal()"></button>
                    </div>
                </div>
                <div class="modal-body p-0 d-flex flex-column align-items-center justify-content-center" style="min-height: 70vh;">
                    <div class="drawing-tools p-2 w-100 d-flex flex-wrap justify-content-center gap-2">
                        <button class="btn btn-sm btn-outline-primary" id="btn-pen" onclick="setTool('pen')">
                            <i class="fas fa-pen"></i> Pen
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-arrow" onclick="setTool('arrow')">
                            <i class="fas fa-long-arrow-alt-right"></i> Arrow
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-rect" onclick="setTool('rect')">
                            <i class="far fa-square"></i> Rect
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-circle" onclick="setTool('circle')">
                            <i class="far fa-circle"></i> Circle
                        </button>
                        <button class="btn btn-sm btn-outline-primary" id="btn-text" onclick="setTool('text')">
                            <i class="fas fa-font"></i> Text
                        </button>
                        <div class="vr mx-2"></div>
                        <input type="color" id="drawColor" value="#ff0000" class="form-control form-control-color form-control-sm">
                        <input type="range" id="lineWidth" min="1" max="10" value="3" class="form-range w-auto" title="Brush Size">
                        <div class="vr mx-2"></div>
                        <button class="btn btn-sm btn-danger" onclick="clearCanvas()">
                            <i class="fas fa-eraser"></i> Clear All
                        </button>
                    </div>
                    <div id="canvasWrapper" class="p-3" style="max-width: 100%; max-height: 80vh; overflow: auto;">
                        <canvas id="drawingCanvas" class="shadow-lg bg-white"></canvas>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeDrawingModal()">
                        <i class="fas fa-times me-1"></i> Cancel
                    </button>
                    <button class="btn btn-success px-4" onclick="saveAnnotation()">
                        <i class="fas fa-check me-1"></i> Save Annotations
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- All original JavaScript preserved exactly -->
    <script>
        // --- 1. GLOBAL STATE & INITIALIZATION ---
        let screenshotImages = [];
        let activeIdx = -1;
        let currentDate = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];

        // Drawing Engine State
        let isDrawing = false;
        let currentTool = 'pen';
        let startX, startY;
        let snapshot = null;
        let historyStack = [];
        let redoStack = [];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('displayDate').innerText = currentDate;
            setupEventListeners();
        });

        // --- 2. FORM & UI HELPERS ---
        function setupEventListeners() {
            // Auto-calculate P&L
            const inputs = ['entryPrice', 'exitPrice', 'quantity', 'direction'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', calculatePnL);
            });

            // Clipboard Paste Support
            document.addEventListener('paste', async (e) => {
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        const blob = item.getAsFile();
                        processFile(blob);
                    }
                }
            });

            // File Input Change
            document.getElementById('fileInput').addEventListener('change', (e) => {
                Array.from(e.target.files).forEach(processFile);
            });

            // Form Submission
            document.getElementById('tradeForm').addEventListener('submit', handleFormSubmit);
        }

        function calculatePnL() {
            const entry = parseFloat(document.getElementById('entryPrice').value) || 0;
            const exit = parseFloat(document.getElementById('exitPrice').value) || 0;
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            const dir = document.getElementById('direction').value;
            
            let res = dir === 'LONG' ? (exit - entry) * qty : (entry - exit) * qty;
            document.getElementById('pnl').value = res.toFixed(2);
        }

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                screenshotImages.push({
                    data: e.target.result,
                    name: file.name || `img_${Date.now()}.png`,
                    annotated: false,
                    tags: []
                });
                renderPreview();
            };
            reader.readAsDataURL(file);
        }

        function renderPreview() {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = screenshotImages.map((img, i) => `
                <div class="position-relative border rounded p-1" style="width: 125px;">
                    <img src="${img.data}" width="115" height="80" class="object-fit-cover rounded">
                    <div class="position-absolute top-0 end-0 p-1 d-flex flex-column gap-1">
                        <button type="button" class="btn btn-sm btn-primary py-0 px-1" onclick="openAnnotation(${i})"><i class="fas fa-edit"></i></button>
                        <button type="button" class="btn btn-sm btn-danger py-0 px-1" onclick="removeImg(${i})"><i class="fas fa-times"></i></button>
                    </div>
                    ${img.annotated ? '<small class="text-success" style="font-size:10px">Annotated</small>' : ''}
                </div>
            `).join('');
        }

        function removeImg(idx) {
            screenshotImages.splice(idx, 1);
            renderPreview();
        }

        // --- 3. RESPONSIVE ANNOTATION ENGINE ---
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        function openAnnotation(idx) {
            activeIdx = idx;
            const modal = document.getElementById('drawingModal');
            modal.style.display = 'block';

            const img = new Image();
            img.onload = () => {
                // Fit canvas to screen while keeping original image ratio
                const maxWidth = window.innerWidth * 0.9;
                const maxHeight = window.innerHeight * 0.7;
                let width = img.width;
                let height = img.height;

                const ratio = Math.min(maxWidth / width, maxHeight / height);
                canvas.width = width * ratio;
                canvas.height = height * ratio;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Reset stacks for new session
                historyStack = [];
                redoStack = [];
                saveState(); 
                setTool('pen');
            };
            img.src = screenshotImages[idx].data;
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.drawing-tools .btn').forEach(btn => btn.classList.remove('active', 'btn-primary'));
            const btn = document.getElementById(`btn-${tool}`);
            if (btn) btn.classList.add('active', 'btn-primary');
        }

        // State Management (Undo/Redo)
        function saveState() {
            if (historyStack.length >= 20) historyStack.shift();
            historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            redoStack = [];
        }

        function undo() {
            if (historyStack.length > 1) {
                redoStack.push(historyStack.pop());
                ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                const state = redoStack.pop();
                historyStack.push(state);
                ctx.putImageData(state, 0, 0);
            }
        }

        // Drawing Interaction
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = document.getElementById('drawColor').value;
            ctx.fillStyle = document.getElementById('drawColor').value;
            ctx.lineWidth = document.getElementById('lineWidth').value;
            ctx.lineCap = 'round';
            if (currentTool === 'pen') ctx.beginPath();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const curX = e.clientX - rect.left;
            const curY = e.clientY - rect.top;

            if (currentTool === 'pen') {
                ctx.lineTo(curX, curY);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                if (currentTool === 'arrow') drawArrow(startX, startY, curX, curY);
                if (currentTool === 'rect') ctx.strokeRect(startX, startY, curX - startX, curY - startY);
                if (currentTool === 'circle') drawCircle(startX, startY, curX, curY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDrawing && currentTool === 'text') {
                const text = prompt("Enter text label:");
                if (text) {
                    ctx.font = `${ctx.lineWidth * 5}px Arial`;
                    ctx.fillText(text, startX, startY);
                }
            }
            if (isDrawing) {
                isDrawing = false;
                saveState();
            }
        });

        // Shape Drawing Helpers
        function drawArrow(x1, y1, x2, y2) {
            const headlen = 15;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        function drawCircle(x1, y1, x2, y2) {
            const r = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            ctx.beginPath();
            ctx.arc(x1, y1, r, 0, 2 * Math.PI);
            ctx.stroke();
        }

        function clearCanvas() {
            if (confirm("Clear all drawings?")) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    saveState();
                };
                img.src = screenshotImages[activeIdx].data;
            }
        }

        function saveAnnotation() {
            screenshotImages[activeIdx].data = canvas.toDataURL();
            screenshotImages[activeIdx].annotated = true;
            closeDrawingModal();
            renderPreview();
        }

        function closeDrawingModal() {
            document.getElementById('drawingModal').style.display = 'none';
        }

        // --- 4. FIREBASE DATA FLOW ---
        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('saveTradeBtn');
            btn.disabled = true;

            const tradeData = {
                symbol: document.getElementById('symbol').value,
                direction: document.getElementById('direction').value,
                entryPrice: parseFloat(document.getElementById('entryPrice').value) || 0,
                exitPrice: parseFloat(document.getElementById('exitPrice').value) || 0,
                takeProfit: parseFloat(document.getElementById('takeProfit').value) || 0,
                stopLoss: parseFloat(document.getElementById('stopLoss').value) || 0,
                quantity: parseInt(document.getElementById('quantity').value) || 0,
                entryTime: document.getElementById('entryTime').value || "",
                exitTime: document.getElementById('exitTime').value || "",
                strategy: document.getElementById('strategy').value || "Other",
                notes: document.getElementById('notes').value || ""
            };

            try {
                // Convert Base64 data to Files for Storage
                const filesToUpload = await Promise.all(screenshotImages.map(async img => {
                    const res = await fetch(img.data);
                    const blob = await res.blob();
                    const file = new File([blob], img.name, { type: "image/png" });
                    file.metadata = { annotated: img.annotated, tags: img.tags };
                    return file;
                }));

                const success = await TradeJournal.saveTrade(currentDate, tradeData, filesToUpload);
                if (success) {
                    alert("Trade Saved Successfully!");
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error(err);
                alert("Error saving trade. Check console.");
            } finally {
                btn.disabled = false;
            }
        }

        function openCameraModal() {
            alert("Camera requires HTTPS. Please use Browse or Paste (Ctrl+V) for now.");
        }
    </script>
</body>
