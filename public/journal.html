<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Trade - Trade Journal Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Trade Journal</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Journal</a></li>
                    <li class="nav-item"><a class="nav-link" href="calendar.html">Calendar</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="export.html">Backup</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <h2 class="mb-4">Add Trade for <span id="displayDate" class="text-primary"></span></h2>
        
        <form id="tradeForm" class="bg-white p-4 shadow-sm rounded">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Symbol</label>
            <input type="text" id="symbol" class="form-control" placeholder="e.g., NIFTY 22400 CE" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Direction</label>
            <select id="direction" class="form-select">
                <option value="LONG">LONG (Buy) 📈</option>
                <option value="SHORT">SHORT (Sell) 📉</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Entry Price</label>
            <input type="number" id="entryPrice" class="form-control" step="0.01" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Exit Price</label>
            <input type="number" id="exitPrice" class="form-control" step="0.01">
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold text-success">Take Profit</label>
            <input type="number" id="takeProfit" class="form-control" step="0.01">
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold text-danger">Stop Loss</label>
            <input type="number" id="stopLoss" class="form-control" step="0.01">
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Quantity</label>
            <input type="number" id="quantity" class="form-control" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Entry Time</label>
            <input type="time" id="entryTime" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Exit Time</label>
            <input type="time" id="exitTime" class="form-control">
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label fw-bold">Strategy</label>
            <select id="strategy" class="form-select">
                <option value="">Select Strategy</option>
                <option value="Breakout">Breakout</option>
                <option value="Pullback">Pullback</option>
                <option value="Reversal">Reversal</option>
                <option value="Trend Following">Trend Following</option>
                <option value="Range Trading">Range Trading</option>
                <option value="Scalping">Scalping</option>
                <option value="Swing Trading">Swing Trading</option>
                <option value="News Trading">News Trading</option>
                <option value="Other">Other</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12 mb-3">
            <label class="form-label fw-bold">Calculated P&L</label>
            <input type="number" id="pnl" class="form-control bg-light fw-bold" readonly>
        </div>
    </div>

    <div class="screenshot-section mt-4 p-3 bg-light rounded border">
        <label class="form-label fw-bold"><i class="fas fa-camera"></i> Screenshots with Annotations</label>
        <div class="d-flex gap-2 mb-3">
            <button type="button" class="btn btn-outline-secondary" onclick="document.getElementById('fileInput').click()">Browse</button>
            <button type="button" class="btn btn-outline-secondary" id="pasteBtn">Paste (Ctrl+V)</button>
            <button type="button" class="btn btn-outline-secondary" onclick="openCameraModal()">Take Photo</button>
            <input type="file" id="fileInput" multiple accept="image/*" class="d-none">
        </div>
        <div id="previewGrid" class="preview-grid d-flex flex-wrap gap-2"></div>
    </div>

    <div class="mb-3 mt-4">
        <label class="form-label fw-bold">Trade Notes</label>
        <textarea id="notes" class="form-control" rows="3" placeholder="Setup details, emotions, or mistakes..."></textarea>
    </div>

    <button type="submit" id="saveTradeBtn" class="btn btn-success w-100 py-2 fw-bold">SAVE TRADE</button>
</form>

        <div class="mt-5">
            <h4>Today's Log</h4>
            <div id="todaysTradesList" class="table-responsive"></div>
        </div>
    </div>

    <div class="fab-container">
        <button class="fab fab-contract" onclick="openContractModal()" title="Import PDF">
            <i class="fas fa-file-invoice"></i>
        </button>
    </div>

    <div id="drawingModal" class="modal bg-dark bg-opacity-75">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Annotate Screenshot</h5>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="undo()"><i class="fas fa-undo"></i></button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="redo()"><i class="fas fa-redo"></i></button>
                    <button type="button" class="btn-close" onclick="closeDrawingModal()"></button>
                </div>
            </div>
            <div class="modal-body p-0 bg-secondary d-flex flex-column align-items-center justify-content-center" style="min-height: 70vh;">
                <div class="drawing-tools p-2 bg-white w-100 d-flex flex-wrap justify-content-center gap-2 border-bottom">
                    <button class="btn btn-sm btn-outline-primary" id="btn-pen" onclick="setTool('pen')"><i class="fas fa-pen"></i> Pen</button>
                    <button class="btn btn-sm btn-outline-primary" id="btn-arrow" onclick="setTool('arrow')"><i class="fas fa-long-arrow-alt-right"></i> Arrow</button>
                    <button class="btn btn-sm btn-outline-primary" id="btn-rect" onclick="setTool('rect')"><i class="far fa-square"></i> Rect</button>
                    <button class="btn btn-sm btn-outline-primary" id="btn-circle" onclick="setTool('circle')"><i class="far fa-circle"></i> Circle</button>
                    <button class="btn btn-sm btn-outline-primary" id="btn-text" onclick="setTool('text')"><i class="fas fa-font"></i> Text</button>
                    <div class="vr mx-2"></div>
                    <input type="color" id="drawColor" value="#ff0000" class="form-control form-control-color form-control-sm">
                    <input type="range" id="lineWidth" min="1" max="10" value="3" class="form-range w-auto" title="Brush Size">
                    <div class="vr mx-2"></div>
                    <button class="btn btn-sm btn-danger" onclick="clearCanvas()"><i class="fas fa-eraser"></i> Clear All</button>
                </div>
                <div id="canvasWrapper" class="p-3" style="max-width: 100%; max-height: 80vh; overflow: auto;">
                    <canvas id="drawingCanvas" class="shadow-lg bg-white"></canvas>
                </div>
            </div>
            <div class="modal-footer bg-light">
                <button class="btn btn-secondary" onclick="closeDrawingModal()">Cancel</button>
                <button class="btn btn-success px-4" onclick="saveAnnotation()">Save Annotations</button>
            </div>
        </div>
    </div>
</div>

    <script src="app.js"></script>
    <script>
        // --- 1. GLOBAL STATE & INITIALIZATION ---
let screenshotImages = [];
let activeIdx = -1;
let currentDate = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];

// Drawing Engine State
let isDrawing = false;
let currentTool = 'pen';
let startX, startY;
let snapshot = null;
let historyStack = [];
let redoStack = [];

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('displayDate').innerText = currentDate;
    setupEventListeners();
});

// --- 2. FORM & UI HELPERS ---
function setupEventListeners() {
    // Auto-calculate P&L
    const inputs = ['entryPrice', 'exitPrice', 'quantity', 'direction'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', calculatePnL);
    });

    // Clipboard Paste Support
    document.addEventListener('paste', async (e) => {
        const items = e.clipboardData.items;
        for (let item of items) {
            if (item.type.indexOf('image') !== -1) {
                const blob = item.getAsFile();
                processFile(blob);
            }
        }
    });

    // File Input Change
    document.getElementById('fileInput').addEventListener('change', (e) => {
        Array.from(e.target.files).forEach(processFile);
    });

    // Form Submission
    document.getElementById('tradeForm').addEventListener('submit', handleFormSubmit);
}

function calculatePnL() {
    const entry = parseFloat(document.getElementById('entryPrice').value) || 0;
    const exit = parseFloat(document.getElementById('exitPrice').value) || 0;
    const qty = parseInt(document.getElementById('quantity').value) || 0;
    const dir = document.getElementById('direction').value;
    
    let res = dir === 'LONG' ? (exit - entry) * qty : (entry - exit) * qty;
    document.getElementById('pnl').value = res.toFixed(2);
}

function processFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        screenshotImages.push({
            data: e.target.result,
            name: file.name || `img_${Date.now()}.png`,
            annotated: false,
            tags: []
        });
        renderPreview();
    };
    reader.readAsDataURL(file);
}

function renderPreview() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = screenshotImages.map((img, i) => `
        <div class="position-relative border rounded p-1" style="width: 125px;">
            <img src="${img.data}" width="115" height="80" class="object-fit-cover rounded">
            <div class="position-absolute top-0 end-0 p-1 d-flex flex-column gap-1">
                <button type="button" class="btn btn-sm btn-primary py-0 px-1" onclick="openAnnotation(${i})"><i class="fas fa-edit"></i></button>
                <button type="button" class="btn btn-sm btn-danger py-0 px-1" onclick="removeImg(${i})"><i class="fas fa-times"></i></button>
            </div>
            ${img.annotated ? '<small class="text-success" style="font-size:10px">Annotated</small>' : ''}
        </div>
    `).join('');
}

function removeImg(idx) {
    screenshotImages.splice(idx, 1);
    renderPreview();
}

// --- 3. RESPONSIVE ANNOTATION ENGINE ---
const canvas = document.getElementById('drawingCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function openAnnotation(idx) {
    activeIdx = idx;
    const modal = document.getElementById('drawingModal');
    modal.style.display = 'block';

    const img = new Image();
    img.onload = () => {
        // Fit canvas to screen while keeping original image ratio
        const maxWidth = window.innerWidth * 0.9;
        const maxHeight = window.innerHeight * 0.7;
        let width = img.width;
        let height = img.height;

        const ratio = Math.min(maxWidth / width, maxHeight / height);
        canvas.width = width * ratio;
        canvas.height = height * ratio;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // Reset stacks for new session
        historyStack = [];
        redoStack = [];
        saveState(); 
        setTool('pen');
    };
    img.src = screenshotImages[idx].data;
}

function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.drawing-tools .btn').forEach(btn => btn.classList.remove('active', 'btn-primary'));
    const btn = document.getElementById(`btn-${tool}`);
    if (btn) btn.classList.add('active', 'btn-primary');
}

// State Management (Undo/Redo)
function saveState() {
    if (historyStack.length >= 20) historyStack.shift();
    historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    redoStack = [];
}

function undo() {
    if (historyStack.length > 1) {
        redoStack.push(historyStack.pop());
        ctx.putImageData(historyStack[historyStack.length - 1], 0, 0);
    }
}

function redo() {
    if (redoStack.length > 0) {
        const state = redoStack.pop();
        historyStack.push(state);
        ctx.putImageData(state, 0, 0);
    }
}

// Drawing Interaction
canvas.addEventListener('mousedown', (e) => {
    isDrawing = true;
    const rect = canvas.getBoundingClientRect();
    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;
    
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = document.getElementById('drawColor').value;
    ctx.fillStyle = document.getElementById('drawColor').value;
    ctx.lineWidth = document.getElementById('lineWidth').value;
    ctx.lineCap = 'round';
    if (currentTool === 'pen') ctx.beginPath();
});

canvas.addEventListener('mousemove', (e) => {
    if (!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const curX = e.clientX - rect.left;
    const curY = e.clientY - rect.top;

    if (currentTool === 'pen') {
        ctx.lineTo(curX, curY);
        ctx.stroke();
    } else {
        ctx.putImageData(snapshot, 0, 0);
        if (currentTool === 'arrow') drawArrow(startX, startY, curX, curY);
        if (currentTool === 'rect') ctx.strokeRect(startX, startY, curX - startX, curY - startY);
        if (currentTool === 'circle') drawCircle(startX, startY, curX, curY);
    }
});

canvas.addEventListener('mouseup', () => {
    if (isDrawing && currentTool === 'text') {
        const text = prompt("Enter text label:");
        if (text) {
            ctx.font = `${ctx.lineWidth * 5}px Arial`;
            ctx.fillText(text, startX, startY);
        }
    }
    if (isDrawing) {
        isDrawing = false;
        saveState();
    }
});

// Shape Drawing Helpers
function drawArrow(x1, y1, x2, y2) {
    const headlen = 15;
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
}

function drawCircle(x1, y1, x2, y2) {
    const r = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
    ctx.beginPath();
    ctx.arc(x1, y1, r, 0, 2 * Math.PI);
    ctx.stroke();
}

function clearCanvas() {
    if (confirm("Clear all drawings?")) {
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            saveState();
        };
        img.src = screenshotImages[activeIdx].data;
    }
}

function saveAnnotation() {
    screenshotImages[activeIdx].data = canvas.toDataURL();
    screenshotImages[activeIdx].annotated = true;
    closeDrawingModal();
    renderPreview();
}

function closeDrawingModal() {
    document.getElementById('drawingModal').style.display = 'none';
}

// --- 4. FIREBASE DATA FLOW ---
async function handleFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('saveTradeBtn');
    btn.disabled = true;

    const tradeData = {
        symbol: document.getElementById('symbol').value,
        direction: document.getElementById('direction').value,
        entryPrice: parseFloat(document.getElementById('entryPrice').value) || 0,
        exitPrice: parseFloat(document.getElementById('exitPrice').value) || 0,
        takeProfit: parseFloat(document.getElementById('takeProfit').value) || 0,
        stopLoss: parseFloat(document.getElementById('stopLoss').value) || 0,
        quantity: parseInt(document.getElementById('quantity').value) || 0,
        entryTime: document.getElementById('entryTime').value || "",
        exitTime: document.getElementById('exitTime').value || "",
        strategy: document.getElementById('strategy').value || "Other",
        notes: document.getElementById('notes').value || ""
    };

    try {
        // Convert Base64 data to Files for Storage
        const filesToUpload = await Promise.all(screenshotImages.map(async img => {
            const res = await fetch(img.data);
            const blob = await res.blob();
            const file = new File([blob], img.name, { type: "image/png" });
            file.metadata = { annotated: img.annotated, tags: img.tags };
            return file;
        }));

        const success = await TradeJournal.saveTrade(currentDate, tradeData, filesToUpload);
        if (success) {
            alert("Trade Saved Successfully!");
            window.location.href = 'index.html';
        }
    } catch (err) {
        console.error(err);
        alert("Error saving trade. Check console.");
    } finally {
        btn.disabled = false;
    }
}

function openCameraModal() {
    alert("Camera requires HTTPS. Please use Browse or Paste (Ctrl+V) for now.");
}
    </script>
</body>
</html>
