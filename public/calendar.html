<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Calendar - Trade Journal Pro</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ============== 60-30-10 COLOR SCHEME (Matching index.html) ============== */
        :root {
            /* 60% - Primary Background */
            --bg-primary: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            
            /* 30% - Secondary Surface */
            --surface-white: #ffffff;
            --surface-hover: #f1f5f9;
            --border-light: #e2e8f0;
            
            /* 10% - Accent Colors */
            --accent-primary: #3498db;
            --accent-hover: #2980b9;
            --accent-success: #27ae60;
            --accent-danger: #e74c3c;
            --accent-warning: #f39c12;
            
            /* Text Colors */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            /* Shadows */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            
            /* Border Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #0f172a;
                --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                --surface-white: #1e293b;
                --surface-hover: #334155;
                --border-light: #334155;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --text-muted: #64748b;
            }
            
            body {
                background: var(--bg-gradient);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Modern Navigation - Matching index.html */
        .navbar {
            background: #2c3e50 !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-md);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-brand i {
            -webkit-text-fill-color: white;
            color: white;
        }

        .nav-link {
            position: relative;
            padding: 0.5rem 1rem !important;
            margin: 0 0.25rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        .nav-link.active {
            background: var(--accent-primary) !important;
            color: white !important;
        }

        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
        }

        .navbar-toggler-icon {
            filter: invert(1);
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Calendar Navigation - Enhanced */
        .calendar-nav {
            background: var(--surface-white);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--border-light);
        }

        .calendar-nav button {
            padding: 0.6rem 1.2rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-sm);
        }

        .calendar-nav button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .calendar-nav h2 {
            color: var(--text-primary);
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Calendar Grid - Enhanced */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.75rem;
            background: var(--surface-white);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            margin-bottom: 1.5rem;
        }

        .calendar-header {
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 0.75rem;
            background: var(--surface-hover);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Calendar Day Styling - Enhanced */
        .calendar-day {
            background: var(--surface-white);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            min-height: 100px;
        }

        .calendar-day:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .calendar-day.other-month {
            opacity: 0.4;
            background: var(--surface-hover);
        }

        .day-number {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .day-info {
            margin-top: auto;
            text-align: right;
        }

        .day-trade-count {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .day-pnl-value {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Color coding for P&L days - Enhanced */
        .calendar-day.profitable-day {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.1) 0%, rgba(39, 174, 96, 0.05) 100%);
            border-left: 3px solid var(--accent-success);
        }

        .calendar-day.losing-day {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1) 0%, rgba(231, 76, 60, 0.05) 100%);
            border-left: 3px solid var(--accent-danger);
        }

        .calendar-day.breakeven-day {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.1) 0%, rgba(243, 156, 18, 0.05) 100%);
            border-left: 3px solid var(--accent-warning);
        }

        .calendar-day.no-trade-day {
            background: var(--surface-white);
        }

        /* Expiry Day Styles - Enhanced */
        .calendar-day.nifty-expiry {
            position: relative;
            border-right: 3px solid #2196f3;
        }

        .calendar-day.sensex-expiry {
            position: relative;
            border-right: 3px solid #ff9800;
        }

        .calendar-day.nifty-expiry::after {
            content: 'NIFTY';
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 0.55rem;
            background: #2196f3;
            color: white;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .calendar-day.sensex-expiry::after {
            content: 'SENSEX';
            position: absolute;
            bottom: 4px;
            left: 4px;
            font-size: 0.55rem;
            background: #ff9800;
            color: white;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Legend - Enhanced */
        .calendar-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin: 2rem 0;
            padding: 1.25rem;
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .color-box {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-sm);
        }

        .color-box.profitable-day {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.2) 0%, rgba(39, 174, 96, 0.1) 100%);
            border-left: 3px solid var(--accent-success);
        }

        .color-box.losing-day {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.2) 0%, rgba(231, 76, 60, 0.1) 100%);
            border-left: 3px solid var(--accent-danger);
        }

        .color-box.breakeven-day {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2) 0%, rgba(243, 156, 18, 0.1) 100%);
            border-left: 3px solid var(--accent-warning);
        }

        .color-box.no-trade-day {
            background: var(--surface-white);
            border: 1px solid var(--border-light);
        }

        .color-box.nifty-expiry {
            border-right: 3px solid #2196f3;
            background: transparent;
        }

        .color-box.sensex-expiry {
            border-right: 3px solid #ff9800;
            background: transparent;
        }

        /* Selected Day Summary - Enhanced */
        .selected-day-summary {
            background: var(--surface-white);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-top: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        .selected-day-summary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-success), var(--accent-danger));
        }

        .selected-day-summary h3 {
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            background: var(--surface-hover);
            padding: 1rem;
            border-radius: var(--radius-md);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card .stat-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .view-day-btn {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .view-day-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Custom Scrollbar - Matching index.html */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface-hover);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ============== RESPONSIVE DESIGN ============== */
        
        /* Mobile devices (up to 768px) */
        @media screen and (max-width: 768px) {
            .container {
                padding: 0 0.75rem;
            }

            .calendar-nav {
                flex-direction: column;
                gap: 0.75rem;
                padding: 1rem;
            }

            .calendar-nav button {
                width: 100%;
                justify-content: center;
                padding: 0.75rem;
            }

            .calendar-nav h2 {
                font-size: 1.25rem;
                order: -1;
            }

            .calendar-grid {
                gap: 0.5rem;
                padding: 0.75rem;
                overflow-x: auto;
            }

            .calendar-header {
                font-size: 0.75rem;
                padding: 0.5rem;
            }

            .calendar-day {
                min-height: 70px;
                padding: 0.5rem;
            }

            .day-number {
                font-size: 0.85rem;
            }

            .day-trade-count {
                font-size: 0.6rem;
            }

            .day-pnl-value {
                font-size: 0.7rem;
            }

            .calendar-day.nifty-expiry::after,
            .calendar-day.sensex-expiry::after {
                font-size: 0.45rem;
                padding: 1px 3px;
            }

            .calendar-legend {
                gap: 1rem;
                padding: 1rem;
                flex-wrap: wrap;
            }

            .legend-item {
                font-size: 0.75rem;
            }

            .color-box {
                width: 20px;
                height: 20px;
            }

            .summary-stats {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .stat-card .stat-value {
                font-size: 1.25rem;
            }

            .view-day-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Small phones (up to 480px) */
        @media screen and (max-width: 480px) {
            .calendar-grid {
                gap: 0.25rem;
            }

            .calendar-day {
                min-height: 60px;
                padding: 0.25rem;
            }

            .day-number {
                font-size: 0.75rem;
            }

            .calendar-day.nifty-expiry::after,
            .calendar-day.sensex-expiry::after {
                font-size: 0.4rem;
                padding: 1px 2px;
            }

            .calendar-header {
                font-size: 0.7rem;
                padding: 0.25rem;
            }
        }

        /* Tablets (769px - 1024px) */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 1rem;
            }
            
            .calendar-grid {
                gap: 0.5rem;
            }
        }

        /* Dark mode adjustments for expiry badges */
        @media (prefers-color-scheme: dark) {
            .calendar-day.nifty-expiry::after,
            .calendar-day.sensex-expiry::after {
                opacity: 0.9;
            }
            
            .calendar-day.profitable-day {
                background: linear-gradient(135deg, rgba(39, 174, 96, 0.15) 0%, rgba(39, 174, 96, 0.08) 100%);
            }
            
            .calendar-day.losing-day {
                background: linear-gradient(135deg, rgba(231, 76, 60, 0.15) 0%, rgba(231, 76, 60, 0.08) 100%);
            }
            
            .calendar-day.breakeven-day {
                background: linear-gradient(135deg, rgba(243, 156, 18, 0.15) 0%, rgba(243, 156, 18, 0.08) 100%);
            }
        }

        /* Accessibility - Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Focus States */
        button:focus-visible,
        .calendar-day:focus-visible {
            outline: 3px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Touch Target Sizes for Mobile */
        @media (hover: none) and (pointer: coarse) {
            button,
            .calendar-day,
            .nav-link {
                min-height: 44px;
            }
            
            .calendar-day {
                min-height: 70px;
            }
        }

        /* Print Styles */
        @media print {
            .calendar-nav button,
            .navbar,
            .view-day-btn {
                display: none !important;
            }
            
            .calendar-grid,
            .selected-day-summary {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }

        /* Keep original text color classes for P&L values */
        .text-success {
            color: var(--accent-success) !important;
        }
        
        .text-danger {
            color: var(--accent-danger) !important;
        }
        
        .profit { color: var(--accent-success) !important; font-weight: bold; }
        .loss { color: var(--accent-danger) !important; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-chart-line me-2"></i>Trade Journal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-book me-1"></i>Journal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="calendar.html">
                            <i class="fas fa-calendar me-1"></i>Calendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="fas fa-chart-pie me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="export.html">
                            <i class="fas fa-download me-1"></i>Backup
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Month Navigation -->
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">
                <i class="fas fa-chevron-left"></i> Previous
            </button>
            <h2 id="currentMonthYear">March 2026</h2>
            <button onclick="changeMonth(1)">
                Next <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendarGrid">
            <!-- Day headers -->
            <div class="calendar-header">Sun</div>
            <div class="calendar-header">Mon</div>
            <div class="calendar-header">Tue</div>
            <div class="calendar-header">Wed</div>
            <div class="calendar-header">Thu</div>
            <div class="calendar-header">Fri</div>
            <div class="calendar-header">Sat</div>
            
            <!-- Calendar days will be inserted here by JavaScript -->
        </div>

        <!-- Legend -->
        <div class="calendar-legend">
            <div class="legend-item">
                <span class="color-box profitable-day"></span>
                <span>Profitable Day</span>
            </div>
            <div class="legend-item">
                <span class="color-box losing-day"></span>
                <span>Losing Day</span>
            </div>
            <div class="legend-item">
                <span class="color-box breakeven-day"></span>
                <span>Breakeven</span>
            </div>
            <div class="legend-item">
                <span class="color-box no-trade-day"></span>
                <span>No Trades</span>
            </div>
            <div class="legend-item">
                <span class="color-box nifty-expiry"></span>
                <span>Nifty Expiry (Tue)</span>
            </div>
            <div class="legend-item">
                <span class="color-box sensex-expiry"></span>
                <span>Sensex Expiry (Thu)</span>
            </div>
        </div>

        <!-- Selected Day Summary -->
        <div class="selected-day-summary" id="selectedDaySummary" style="display: none;">
            <h3 id="selectedDate">March 13, 2026</h3>
            <div class="summary-stats">
                <div class="stat-card">
                    <span class="stat-label">Trades</span>
                    <span class="stat-value" id="summaryTrades">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">P&L</span>
                    <span class="stat-value" id="summaryPnL">₹0.00</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Win Rate</span>
                    <span class="stat-value" id="summaryWinRate">0%</span>
                </div>
            </div>
            <button onclick="goToDate()" class="view-day-btn">
                <i class="fas fa-eye"></i> View Day Details
            </button>
        </div>
    </div>

    <!-- Keep all original script references -->
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
